      tags: [vpn]
      summary: 新建 WireGuard 实例
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string, description: 可选；空则服务端生成 }
                name: { type: string }
                mode: { type: string, enum: [server, client], default: server }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  id: { type: string }

  /api/v1/vpn/wireguard/instances/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [vpn]
      summary: 单实例配置与 wg 状态
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    $ref: '#/components/schemas/WireGuardInstance'
                  status:
                    type: object
                    additionalProperties: true
        '404':
          description: 实例不存在
    put:
      tags: [vpn]
      summary: 保存实例配置
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WireGuardInstance'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除实例（至少保留 1 个）
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

