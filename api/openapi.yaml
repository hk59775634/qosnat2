        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WGPeer'
    post:
      tags: [vpn]
      summary: 添加/更新 Peer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WGPeer'
