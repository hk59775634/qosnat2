      tags: [network]
      summary: 保存路由后端与开机启动设置
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                route_backend: { type: string, enum: [kernel, frr] }
                boot_on_startup: { type: boolean }
                extra_config: { type: string }
      responses:
        '200':
          description: ok

  /api/v1/frr/install:
    post:
      tags: [network]
      summary: 后台 apt 安装 FRR
      responses:
        '202':
          description: install started
        '200':
          description: already installed

  /api/v1/frr/install/status:
    get:
      tags: [network]
      summary: FRR 安装任务状态
      responses:
        '200':
          description: job state

  /api/v1/frr/service:
    post:
      tags: [network]
      summary: FRR systemd 操作 start|stop|restart
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [start, stop, restart] }
      responses:
        '200':
          description: ok

  /api/v1/frr/config:
    get:
      tags: [network]
      summary: 读取 FRR 原始配置文件
      parameters:
        - name: which
          in: query
          schema: { type: string, enum: [frr.conf, extra, managed, dynamic, daemons, include] }
      responses:
        '200':
          description: path + content
    put:
      tags: [network]
      summary: 写入 FRR 原始配置文件
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [which, content]
              properties:
                which: { type: string }
                content: { type: string }
      responses:
        '200':
          description: ok

  /api/v1/frr/apply:
    post:
      tags: [network]
      summary: 通过 FRR 回放托管路由
      responses:
        '200':
          description: ok

  /api/v1/frr/dynamic-routing:
    get:
      tags: [network]
