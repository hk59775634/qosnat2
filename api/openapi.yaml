      summary: 端口转发列表 + 网卡/默认项
      responses:
        '200':
          description: forwards, interfaces, defaults, dev_lan/dev_wan
    post:
      tags: [nat]
      summary: 添加 DNAT 规则并 reload nft
      description: |
        同步生成 prerouting DNAT、forward 链 `auto-fwd-{id}-{proto}` 放行规则与 LAN hairpin NAT。
        删除转发会一并移除上述自动防火墙规则。
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WanPortForward'
      responses:
        '200':
          description: 创建的规则
        '400':
          description: 校验失败或 nft 预检失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [nat]
      summary: 按 id 删除规则
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
