  /api/v1/network/warp/status:
    get:
      tags: [network]
      summary: Cloudflare WARP 连接状态
      description: |
        `enabled` 为持久化开关（用户意图）；`connected` 为当前隧道探测结果。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  installed:
                    type: boolean
                  enabled:
                    type: boolean
                    description: 持久化 WARP 启用开关
                  connected:
                    type: boolean
                  service_up:
                    type: boolean
                  netns_healthy:
                    type: boolean
                  interface:
                    type: string
                  status_raw:
                    type: string
                  root:
                    type: boolean
                  exit_info:
                    type: object
                    description: 隧道出口 IP/地区与服务类型（Cloudflare cdn-cgi/trace）
                    properties:
                      ip: { type: string }
                      country: { type: string }
                      region: { type: string }
                      city: { type: string }
                      warp: { type: string, description: 'trace warp= 原始值 (off/on/plus/…)' }
                      gateway: { type: string, description: 'trace gateway= 原始值' }
                      warp_tier: { type: string, description: 'off | standard | plus | 2xc' }
                      account_type: { type: string, description: 'warp-cli registration show 账户类型' }
                      org: { type: string, description: 'trace 摘要（兼容）' }
                      fetched_at: { type: string, format: date-time, description: 最后一次检测时间 }
                      error: { type: string }
                  warp_license_key:
                    type: string
                    description: 已保存的 WARP+ License Key（明文，便于管理页核对）
                  warp_license_key_set:
                    type: boolean
                    description: 是否已保存 WARP+ License Key

  /api/v1/network/warp/install:
    post:
      tags: [network]
      summary: 安装 WARP 客户端（需 root）
      responses:
        '202':
          content:
            application/json:
              schema:
                type: object

  /api/v1/network/warp/install/status:
    get:
      tags: [network]
      summary: WARP 安装任务状态
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/network/warp/connect:
    post:
      tags: [network]
      summary: 连接 WARP
      description: 使用已持久化的 License Key（如有）；不在此接口提交新 Key。
      responses:
        '202':
          content:
            application/json:
              schema:
                type: object

  /api/v1/network/warp/license:
    put:
      tags: [network]
      summary: 保存 WARP+ License Key
      description: 仅持久化配置，不立即对 warp-cli 生效；需断开后重新连接才会应用。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                license_key:
                  type: string
                  description: WARP+ License Key；传空字符串可清除
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  warp_license_key:
                    type: string
                    description: 保存后的 License Key（明文）
                  warp_license_key_set: { type: boolean }
    delete:
      tags: [network]
      summary: 删除 WARP+ License Key
      description: 清除已保存 Key、关闭 WARP 启用意图并断开隧道，防止错误 Key 被看门狗反复重连。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  message: { type: string }
                  warp_license_key: { type: string }
                  warp_license_key_set: { type: boolean }

  /api/v1/network/warp/license/apply:
    post:
      tags: [network]
      summary: 对已连接的 WARP 应用已保存的 License Key
      description: 需 root、已安装 warp-cli、WARP netns 健康且 state 中已有 license_key；不修改持久化配置。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  message: { type: string }
                  warp_license_key: { type: string }
                  warp_license_key_set: { type: boolean }
                  exit_info:
                    type: object
                    description: 已连接时返回 WARP 出口信息
        '400':
          description: 未安装 WARP、未保存 Key 或 netns 不健康
        '403':
          description: 非 root 运行 qosnatd

  /api/v1/network/warp/disconnect:
    post:
      tags: [network]
      summary: 断开 WARP
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/network/warp/task/status:
