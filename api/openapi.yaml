    put:
      tags: [network]
      summary: 更新托管路由
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteEntry'
    delete:
      tags: [network]
      summary: 删除托管路由
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /api/v1/frr:
    get:
      tags: [network]
