openapi: 3.0.3
info:
  title: qosnat2 API
  description: |
    单机双网卡 QoS（HTB + eBPF + IFB）+ NAT（nftables）控制面。

    **鉴权**：除 `GET /api/v1/health`、`/api/v1/setup/*` 与 `POST /api/v1/login` 外，需 Session Cookie `qosnat_sess` 或请求头 `X-API-Key`（`X-API-Key` 为实验性，见 `/api/v1/api-keys`）。

    **交互文档**：Web UI → 开发 → API (Scalar)，或 `GET /openapi.yaml`。
  version: 1.0.0
  contact:
    name: qosnat2

servers:
  - url: /
    description: 当前 qosnatd 实例

tags:
  - name: health
  - name: auth
  - name: setup
  - name: network
  - name: nat
  - name: shaper
  - name: stats
  - name: ebpf
  - name: system
  - name: vpn
  - name: diagnostics

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: qosnat_sess
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Ok:
      type: object
      properties:
        ok:
          type: boolean
    Error:
      type: object
      properties:
        error:
          type: string
    RateLimit:
      type: object
      properties:
        down:
          type: string
          example: 8mbit
        up:
          type: string
          example: 8mbit
    HostRate:
      allOf:
        - $ref: '#/components/schemas/RateLimit'
    DHCPState:
      type: object
      properties:
        enabled: { type: boolean }
        interface: { type: string, description: 绑定网卡，默认 DEV_LAN }
        range_start: { type: string }
        range_end: { type: string }
        router: { type: string }
        netmask: { type: string }
        domain: { type: string }
        dns_servers: { type: array, items: { type: string } }
        lease_time_sec: { type: integer }
        authoritative: { type: boolean }
        static_leases:
          type: array
          items:
            type: object
            properties:
              mac: { type: string }
              ip: { type: string }
              hostname: { type: string }
              comment: { type: string }
    RouteEntry:
      type: object
      properties:
        id: { type: string }
        dest: { type: string, example: "10.0.0.0/8" }
        gateway: { type: string }
        device: { type: string }
        table: { type: integer }
        metric: { type: integer }
        comment: { type: string }
        enabled: { type: boolean }
    WanPortForward:
      type: object
      properties:
        id: { type: string }
        interface: { type: string, description: 入接口，默认 DEV_WAN }
        ip_version: { type: string, enum: [ipv4, ipv6] }
        proto: { type: string, enum: [tcp, udp, tcp_udp] }
        src_addr: { type: string, example: "0.0.0.0/0" }
        dst_addr: { type: string, description: 目标地址，空为任意 }
        dst_port: { type: integer }
        redirect_ip: { type: string }
        redirect_port: { type: integer }
        comment: { type: string }
    Health:
      type: object
      properties:
        ok: { type: boolean }
        service: { type: string }
        phase: { type: string }
        dev_lan: { type: string }
        dev_wan: { type: string }
        bpf: { type: boolean }
        tc_attach: { type: boolean }
        setup_complete: { type: boolean }
        setup_required: { type: boolean }
        tls_enabled: { type: boolean }
        tls_active: { type: boolean }
        suggest_https: { type: boolean, description: 已配置 HTTPS 但进程仍监听 HTTP，需重启 qosnatd }
        admin_port: { type: string }
    TLSStatus:
      type: object
      properties:
        tls_enabled: { type: boolean }
        tls_active: { type: boolean }
        cert_path: { type: string }
        key_path: { type: string }
        has_cert_file: { type: boolean }
        has_key_file: { type: boolean }
        cert_subject: { type: string }
        cert_not_after: { type: string, format: date-time }
    GeneralSettings:
      type: object
      properties:
        hostname: { type: string }
        admin_user: { type: string }
        dev_lan: { type: string }
        dev_wan: { type: string }
        setup_complete: { type: boolean }
        tls:
          $ref: '#/components/schemas/TLSStatus'
    GeneralSettingsPut:
      type: object
      properties:
        hostname: { type: string }
        new_password: { type: string, minLength: 8 }
        current_password: { type: string }
        tls_enabled: { type: boolean }
        tls_cert: { type: string, description: PEM 证书 }
        tls_key: { type: string, description: PEM 私钥 }
    IfaceAddr:
      type: object
      properties:
        family: { type: string }
        cidr: { type: string }
        scope: { type: string }
    IfaceTraffic:
      type: object
      properties:
        rx_mbps: { type: number }
        tx_mbps: { type: number }
    IfaceListItem:
      type: object
      properties:
        name: { type: string }
        up: { type: boolean }
        operstate: { type: string }
        mac: { type: string }
        addrs: { type: array, items: { $ref: '#/components/schemas/IfaceAddr' } }
        link_speed_mbps: { type: integer, description: 协商线速 Mbps，0=未知 }
        role: { type: string, enum: [LAN, WAN] }
        traffic: { $ref: '#/components/schemas/IfaceTraffic' }
        rss_channels: { type: integer }
    TrafficPoint:
      type: object
      properties:
        ts: { type: integer, format: int64 }
        lan_rx_mbps: { type: number }
        lan_tx_mbps: { type: number }
        wan_rx_mbps: { type: number }
        wan_tx_mbps: { type: number }
        cpu_percent: { type: number }
        conntrack: { type: integer }
    EthtoolRing:
      type: object
      properties:
        rx_max: { type: integer }
        rx_current: { type: integer }
        tx_max: { type: integer }
        tx_current: { type: integer }
    EthtoolOffloads:
      type: object
      properties:
        gro: { type: string }
        gso: { type: string }
        tx_checksum: { type: string }
        rx_checksum: { type: string }
    EthtoolInfo:
      type: object
      properties:
        device: { type: string }
        ring: { $ref: '#/components/schemas/EthtoolRing' }
        offloads: { $ref: '#/components/schemas/EthtoolOffloads' }
    EthtoolPut:
      type: object
      properties:
        rx_ring: { type: integer }
        tx_ring: { type: integer }
        offloads: { $ref: '#/components/schemas/EthtoolOffloads' }
    VLANIface:
      type: object
      properties:
        id: { type: string }
        parent: { type: string }
        vid: { type: integer, minimum: 1 }
        name: { type: string }
        ipv4: { type: array, items: { type: string } }
        up: { type: boolean }
    WanLink:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        device: { type: string }
        gateway: { type: string }
        metric: { type: integer }
        tier: { type: integer }
        weight: { type: integer, description: 占位，尚未参与选路 }
        enabled: { type: boolean }
    ShaperTC:
      type: object
      properties:
        leaf: { type: string, enum: [fq_codel, cake, fq] }
        fq_flows: { type: integer }
        fq_quantum: { type: integer }
    ShaperTCPut:
      type: object
      properties:
        leaf: { type: string, enum: [fq_codel, cake, fq] }
        fq_flows: { type: integer }
        fq_quantum: { type: integer }
        apply: { type: boolean, description: true 时重建 TC 数据面 }
    WGPeer:
      type: object
      required: [name, public_key]
      properties:
        name: { type: string }
        public_key: { type: string }
        private_key: { type: string, description: 客户端私钥，导出 conf 用 }
        allowed_ips:
          type: array
          items: { type: string }
        endpoint: { type: string }
        persistent_keepalive: { type: integer }
        preshared_key: { type: string }
        rate:
          $ref: '#/components/schemas/HostRate'
    WireGuardConfig:
      type: object
      properties:
        enabled: { type: boolean }
        interface: { type: string, example: wg0 }
        listen_port: { type: integer }
        address: { type: string }
        private_key: { type: string }
        public_key: { type: string }
        dns:
          type: array
          items: { type: string }
        server_endpoint: { type: string }
        peers:
          type: array
          items:
            $ref: '#/components/schemas/WGPeer'
    ConntrackEntry:
      type: object
      properties:
        l3_proto: { type: string }
        protocol: { type: string }
        timeout_sec: { type: integer }
        state: { type: string }
        src: { type: string }
        dst: { type: string }
        sport: { type: integer }
        dport: { type: integer }
        reply_src: { type: string }
        reply_dst: { type: string }
        reply_sport: { type: integer }
        reply_dport: { type: integer }
        mark: { type: integer }
        flags: { type: string }
    ConntrackList:
      type: object
      properties:
        count: { type: integer, description: nf_conntrack_count }
        limit: { type: integer }
        truncated: { type: boolean }
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ConntrackEntry'

security:
  - sessionAuth: []
  - apiKeyAuth: []

paths:
  /openapi.yaml:
    get:
      tags: [health]
      summary: OpenAPI 规范（YAML）
      security: []
      responses:
        '200':
          description: YAML
          content:
            application/yaml: {}

  /api/v1/health:
    get:
      tags: [health]
      summary: 健康检查
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /api/v1/setup/status:
    get:
      tags: [setup]
      summary: 是否需首次引导
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  setup_required: { type: boolean }
                  setup_complete: { type: boolean }

  /api/v1/setup/interfaces:
    get:
      tags: [setup]
      summary: 引导用网卡列表
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  interfaces:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        up: { type: boolean }
                        addrs: { type: array, items: { type: string } }

  /api/v1/setup/complete:
    post:
      tags: [setup]
      summary: 完成初始设置（管理员、LAN/WAN、可选 SNAT IP）
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [admin_user, admin_pass, dev_lan, dev_wan]
              properties:
                admin_user: { type: string }
                admin_pass: { type: string }
                dev_lan: { type: string }
                dev_wan: { type: string }
                policy_routes: { type: array, items: { type: string } }
                shared_ips: { type: array, items: { type: string } }
                hostname: { type: string }
                enable_dhcp: { type: boolean }
                apply_dataplane: { type: boolean }
      responses:
        '200':
          description: OK（Set-Cookie 登录）

  /api/v1/login:
    post:
      tags: [auth]
      summary: 登录（Set-Cookie qosnat_sess）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user, pass]
              properties:
                user: { type: string }
                pass: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/session:
    get:
      tags: [auth]
      summary: 当前会话
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  user: { type: string }

  /api/v1/logout:
    post:
      tags: [auth]
      summary: 登出
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/api-keys:
    get:
      tags: [auth]
      summary: 列出 API Key（实验性，不含完整 secret）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    key_prefix: { type: string }
                    created_at: { type: string }
    post:
      tags: [auth]
      summary: 创建 API Key（仅创建响应返回完整 key）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201':
          description: Created
    delete:
      tags: [auth]
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/dhcp:
    get:
      tags: [network]
      summary: DHCP 配置、dnsmasq 状态与网卡列表
      responses:
        '200':
          description: config + status + interfaces + dev_lan/dev_wan
    put:
      tags: [network]
      summary: 保存 DHCP 配置（不立即应用）
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DHCPState'
      responses:
        '200':
          description: OK

  /api/v1/dhcp/apply:
    post:
      tags: [network]
      summary: 生成 dnsmasq 配置并启动/停止服务
      responses:
        '200':
          description: ok + active

  /api/v1/routes:
    get:
      tags: [network]
      summary: 托管路由 + 内核 main 表快照
      responses:
        '200':
          description: managed + live + dev_lan/dev_wan
    post:
      tags: [network]
      summary: 添加托管静态路由并 ip route replace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteEntry'
      responses:
        '200':
          description: 创建的条目

  /api/v1/routes/apply:
    post:
      tags: [network]
      summary: 回放 state 中全部启用路由
      responses:
        '200':
          description: OK

  /api/v1/routes/{id}:
    put:
      tags: [network]
      summary: 更新托管路由
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteEntry'
    delete:
      tags: [network]
      summary: 删除托管路由
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /api/v1/nat/policy-routes:
    get:
      tags: [nat]
      summary: SNAT 策略网段列表
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
    post:
      tags: [nat]
      summary: 添加策略网段
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [cidr]
              properties:
                cidr: { type: string, example: 10.0.0.0/8 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [nat]
      summary: 删除策略网段
      parameters:
        - name: cidr
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/nat/shared-ips:
    get:
      tags: [nat]
      summary: 共享 SNAT 公网 IP 池（未配置时 ips 为 WAN 口 IPv4）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ips: { type: array, items: { type: string } }
                  configured: { type: array, items: { type: string } }
                  auto_from_wan: { type: boolean }
                  wan_device: { type: string }
    post:
      tags: [nat]
      summary: 添加共享 IP
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ip]
              properties:
                ip: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [nat]
      parameters:
        - name: ip
          in: query
          required: true
          schema: { type: string }

  /api/v1/nat/static-mappings:
    get:
      tags: [nat]
      summary: 1:1 静态映射 inner→outer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: string }
    post:
      tags: [nat]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inner: { type: string }
                outer: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [nat]
      parameters:
        - name: inner
          in: query
          required: true
          schema: { type: string }

  /api/v1/nat/prefix-mappings:
    get:
      tags: [nat]
      summary: 网段 prefix SNAT
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: string }
    post:
      tags: [nat]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inner: { type: string }
                outer: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [nat]
      parameters:
        - name: inner
          in: query
          required: true
          schema: { type: string }

  /api/v1/nat/wan-forwards:
    get:
      tags: [nat]
      summary: 端口转发列表 + 网卡/默认项
      responses:
        '200':
          description: forwards, interfaces, defaults, dev_lan/dev_wan
    post:
      tags: [nat]
      summary: 添加 DNAT 规则并 reload nft
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WanPortForward'
      responses:
        '200':
          description: 创建的规则
    delete:
      tags: [nat]
      summary: 按 id 删除规则
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /api/v1/shaper/wizard:
    post:
      tags: [shaper]
      summary: 添加/更新 QoS 模板（网段或 /32；同步 policy_routes）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cidr: { type: string }
                down: { type: string }
                up: { type: string }
                mask: { type: integer }
                device: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/shaper/profiles/order:
    put:
      tags: [shaper]
      summary: 拖动排序后按顺序重写 id（order 为 CIDR 数组，靠前 id 越小）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  profiles:
                    type: array
                    items:
                      type: object
                      properties:
                        cidr: { type: string }
                        id: { type: integer }
                        down: { type: string }
                        up: { type: string }
                        down_bps: { type: integer }
                        up_bps: { type: integer }

  /api/v1/shaper/profiles:
    get:
      tags: [shaper]
      summary: 网段模板列表与整形绑定信息
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      type: object
                      properties:
                        cidr: { type: string }
                        id: { type: integer, description: 越小优先级越高 }
                        device: { type: string }
                        down: { type: string }
                        up: { type: string }
                        down_bps: { type: integer }
                        up_bps: { type: integer }
                  bind_device: { type: string }
                  dev_lan: { type: string }
                  dev_wan: { type: string }
                  attached_devices: { type: array, items: { type: string } }
    delete:
      tags: [shaper]
      parameters:
        - name: cidr
          in: query
          required: true
          schema: { type: string }

  /api/v1/shaper/active:
    get:
      tags: [shaper]
      summary: Iterate active_host
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    ip: { type: string }
                    down_bps: { type: integer }
                    up_bps: { type: integer }
                    bytes_down: { type: integer }
                    bytes_up: { type: integer }
                    class_minor: { type: integer }

  /api/v1/stats/dashboard:
    get:
      tags: [stats]
      summary: 仪表大厅聚合
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/ebpf/maps:
    get:
      tags: [ebpf]
      summary: BPF Map / attach 状态
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/ebpf/programs:
    get:
      tags: [ebpf]
      summary: TC 挂载的 pinned 程序
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/v1/ebpf/reload:
    post:
      tags: [ebpf]
      summary: 重载 BPF 对象并回放 state
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/system/tuning:
    get:
      tags: [system]
      summary: 系统优化（sysctl / txqueuelen / RPS）当前与生效值
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
    put:
      tags: [system]
      summary: 保存系统优化配置，可选立即应用
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sysctl:
                  type: object
                  additionalProperties: { type: string }
                perf_preset: { type: boolean }
                txqueuelen_lan: { type: integer }
                txqueuelen_wan: { type: integer }
                rps_lan: { type: boolean }
                rps_wan: { type: boolean }
                apply: { type: boolean, description: true 时立即 sysctl -p 并调网卡 }
                apply_recommended: { type: boolean, description: true 时按当前 CPU/内存重算推荐并写入 }
                app:
                  type: object
                  description: shaper.leaf、idle_timeout、txqueuelen、rps 等
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/system/general:
    get:
      tags: [system]
      summary: 常规设置（hostname、HTTPS 状态）
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralSettings'
    put:
      tags: [system]
      summary: 更新 hostname、密码或 HTTPS（改 HTTPS 需 current_password）
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneralSettingsPut'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  warning: { type: string, description: 如需手动 restart qosnatd }
                  tls:
                    $ref: '#/components/schemas/TLSStatus'
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/system/audit:
    get:
      tags: [system]
      summary: 审计日志最近条目

  /api/v1/firewall/rules:
    get:
      tags: [nat]
      summary: 防火墙自定义规则列表
    post:
      tags: [nat]
      summary: 添加规则并 reload nft
    put:
      tags: [nat]
      summary: 更新规则（query id）
    delete:
      tags: [nat]
      summary: 删除规则（query id）

  /api/v1/system/mark-policy:
    get:
      tags: [system]
      summary: nft mark 与 QoS 隔离审计
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/interfaces:
    get:
      tags: [network]
      summary: 网卡列表、link_speed_mbps（sysfs/ethtool）、traffic 与 traffic_history（约 4h）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  dev_lan: { type: string }
                  dev_wan: { type: string }
                  netplan_path: { type: string }
                  interfaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/IfaceListItem'
                  traffic_history:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrafficPoint'
    put:
      tags: [network]
      summary: 修改网卡 IPv4 与 up/down
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [device]
              properties:
                device:
                  type: string
                  description: Linux 网卡名（1–15 字符，字母数字与 `._-`，禁止 `/`）
                ipv4: { type: array, items: { type: string } }
                up: { type: boolean }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/interfaces/queues:
    get:
      tags: [system]
      summary: RSS / 多队列 / softirq
      parameters:
        - name: dev
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/interfaces/ethtool:
    get:
      tags: [network]
      summary: 读取 ethtool ring 与 offload
      parameters:
        - name: device
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EthtoolInfo'
    put:
      tags: [network]
      summary: 设置 ring 或 offload（ethtool -G / -K）
      parameters:
        - name: device
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EthtoolPut'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  ethtool:
                    $ref: '#/components/schemas/EthtoolInfo'

  /api/v1/network/vlans:
    get:
      tags: [network]
      summary: VLAN 列表（netplan）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  vlans:
                    type: array
                    items:
                      $ref: '#/components/schemas/VLANIface'
                  netplan_path: { type: string }
    post:
      tags: [network]
      summary: 添加 VLAN 并 netplan apply
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VLANIface'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VLANIface'
    delete:
      tags: [network]
      summary: 删除 VLAN（query id）
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/network/wan-links:
    get:
