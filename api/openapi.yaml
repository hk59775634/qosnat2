        in: path
        required: true
        schema: { type: string }
    post:
      tags: [vpn]
      summary: 仅生成密钥对（不落库，用于填写 Peer 表单）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  private_key: { type: string }
                  public_key: { type: string }

  /api/v1/vpn/wireguard/instances/{id}/peers:
