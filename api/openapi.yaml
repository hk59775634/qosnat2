      summary: 仅更新 DNS64 并 apply
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DNS64Config'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

