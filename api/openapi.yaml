                  vlans: { type: integer }
                  ifaces: { type: integer }
                  note: { type: string }

  /api/v1/network/netplan/apply:
    post:
      tags: [network]
      summary: 应用 netplan（失败自动回滚）
      description: 备份当前 netplan 与 state，执行 `netplan apply`；失败则恢复备份与 state。
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '400':
          description: apply 失败（已回滚）

  /api/v1/shaper/tc:
