      summary: 添加 VXLAN 隧道并 netplan apply（失败回滚）
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VXLANTunnel'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VXLANTunnel'
    put:
      tags: [network]
      summary: 更新 VXLAN 隧道（query id）
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VXLANTunnel'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VXLANTunnel'
    delete:
      tags: [network]
      summary: 删除 VXLAN 隧道
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/network/wan-links:
    get:
      tags: [network]
