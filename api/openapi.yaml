      tags: [diagnostics]
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }

  /api/v1/diagnostics/captures/{id}/download:
    get:
      tags: [diagnostics]
      summary: 下载 pcap
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/vnd.tcpdump.pcap: {}

  /api/v1/diagnostics/conntrack:
    get:
      tags: [diagnostics]
      summary: conntrack 连接列表
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 200, maximum: 2000 }
        - name: filter
          in: query
          description: 匹配 src/dst 子串
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConntrackList'
        '503':
          description: conntrack-tools 未安装或执行失败
