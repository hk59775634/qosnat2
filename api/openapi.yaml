                    type: object
    put:
      tags: [vpn]
      summary: 保存 WireGuard 配置
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WireGuardConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/wireguard/keys:
    post:
      tags: [vpn]
