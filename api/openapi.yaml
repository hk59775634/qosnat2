                  dev_wan: { type: string }
    post:
      tags: [network]
      summary: 添加 WAN 链路并同步 default 路由
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WanLink'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WanLink'
    put:
      tags: [network]
      summary: 更新 WAN 链路（query id）
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WanLink'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [network]
      summary: 删除 WAN 链路
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/shaper/tc:
    get:
      tags: [shaper]
