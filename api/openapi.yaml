    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [vpn]
      summary: wg-quick up/down（按实例 enabled）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  up: { type: boolean }

  /api/v1/vpn/wireguard/instances/{id}/keys:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [vpn]
      summary: 生成并写入该实例服务端密钥对
      responses:
