    get:
      tags: [system]
      summary: 系统优化（sysctl / txqueuelen / RPS）当前与生效值
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
    put:
      tags: [system]
      summary: 保存系统优化配置，可选立即应用
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sysctl:
                  type: object
                  additionalProperties: { type: string }
                perf_preset: { type: boolean }
                txqueuelen_lan: { type: integer }
                txqueuelen_wan: { type: integer }
                rps_lan: { type: boolean }
                rps_wan: { type: boolean }
                apply: { type: boolean, description: true 时立即 sysctl -p 并调网卡 }
                apply_recommended: { type: boolean, description: true 时按当前 CPU/内存重算推荐并写入 }
                app:
                  type: object
                  description: shaper.fq_flows、fq_quantum、txqueuelen、rps 等
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/system/general:
    get:
      tags: [system]
      summary: 常规设置（hostname、HTTPS 状态）
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralSettings'
    put:
      tags: [system]
      summary: 更新 hostname、密码或 HTTPS（改 HTTPS 需 current_password）
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneralSettingsPut'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  warning: { type: string, description: 如需手动 restart qosnatd }
                  tls:
                    $ref: '#/components/schemas/TLSStatus'
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/system/state/export:
    get:
      tags: [system]
      summary: 导出完整 state.json
      parameters:
        - name: If-None-Match
          in: header
          schema: { type: string }
          description: 上次 ETag；匹配时返回 304
      responses:
        '200':
          headers:
            ETag:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
        '304':
          description: 未修改

  /api/v1/system/state/import:
    post:
      tags: [system]
      summary: 导入 state（需 current_password；apply 失败自动回滚）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [current_password, state]
              properties:
                current_password: { type: string }
                state: { type: object }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '500':
          description: 导入或 dataplane apply 失败（state 已回滚）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/system/state/import/raw:
    put:
      tags: [system]
      summary: 上传原始 state JSON（需 current_password 查询参数或 X-Current-Password）
      parameters:
        - name: current_password
          in: query
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '500':
          description: apply 失败，state 已回滚

  /api/v1/system/notifications:
    get:
      tags: [system]
      summary: 系统通知列表
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/system/version:
    get:
      tags: [system]
      summary: 查询当前版本与可切换版本列表
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemVersionStatus'

  /api/v1/system/version/switch:
    post:
      tags: [system]
      summary: 下载并切换到指定 release 版本（完成后重启 qosnatd）
      description: |
        需要 root 运行 qosnatd。推荐流程：先 POST `/system/version/switch/verify` 验证密码，
        再 POST 本接口仅传 `tag`；verify 为同一会话 Cookie 授予约 2 分钟的一次性授权。
        任务异步执行，通过 `job` 或 GET `/system/version/switch/status` 轮询进度。
        请求体可选 `download_route`（直连 / gh-proxy / 多 WAN 出口），见 GET `/system/version` 的 `download_routes`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemVersionSwitchPut'
      responses:
        '202':
          description: 任务已入队
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemVersionSwitchAccepted'
        '403':
          description: 非 root、密码未验证或口令错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: 已有版本切换任务在运行
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      job: { $ref: '#/components/schemas/SystemVersionSwitchJob' }

  /api/v1/system/version/switch/status:
    get:
      tags: [system]
      summary: 版本切换任务状态
      description: 返回持久化任务状态；若进程内任务已结束但状态文件仍为 running，会自动 reconcile。
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemVersionSwitchJob'

  /api/v1/system/version/switch/reset:
    post:
      tags: [system]
      summary: 清除版本切换任务状态
      description: 将任务状态重置为 idle，便于 UI 关闭任务面板后再次切换。running 任务进行中时返回 409。
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  job: { $ref: '#/components/schemas/SystemVersionSwitchJob' }
        '409':
          description: 任务仍在运行
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      job: { $ref: '#/components/schemas/SystemVersionSwitchJob' }

  /api/v1/system/version/switch/verify:
    post:
      tags: [system]
      summary: 验证管理员密码以短时授权版本切换
      description: |
        校验当前管理员密码后，为调用方会话 Cookie 授予约 2 分钟的一次性授权；
        随后 POST `/system/version/switch` 可仅提交 `tag`（无需再次传密码）。
        授权在首次成功切换请求时被 consume，不可重放。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password]
              properties:
                current_password: { type: string, format: password }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '403':
          description: 密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/system/tls/acme:
    post:
      tags: [system]
      summary: ACME 申请或续期证书（HTTP-01，需 root）
      parameters:
        - name: action
          in: query
          schema: { type: string, enum: [obtain, renew] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [current_password]
              properties:
                current_password: { type: string }
                action: { type: string, enum: [obtain, renew] }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  message: { type: string }
                  tls:
                    $ref: '#/components/schemas/TLSStatus'

  /api/v1/system/certificates:
    get:
      tags: [system]
      summary: 列出证书库
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  certificates:
                    type: array
                    items:
                      $ref: '#/components/schemas/ManagedCertificate'
    post:
      tags: [system]
      summary: 添加证书（manual PEM 或 ACME，需 root）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string, enum: [manual, acme] }
                name: { type: string }
                domain: { type: string }
                email: { type: string }
                staging: { type: boolean }
                cert_pem: { type: string }
                key_pem: { type: string }
                ca_pem: { type: string }
      responses:
        '200':
          description: 已创建
    delete:
      tags: [system]
      summary: 删除证书
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '409':
          description: 证书仍被 ocserv 引用

  /api/v1/system/certificates/auto-renew:
    post:
      tags: [system]
      summary: 开启/恢复 ACME 自动续期（DNS 暂停后需手动恢复）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: string }
                enabled: { type: boolean }
                resume: { type: boolean }

  /api/v1/system/certificates/renew:
    post:
      tags: [system]
      summary: ACME 续签证书库条目（需 root）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: string }
      responses:
        '200':
          description: 已续签

  /api/v1/system/audit:
    get:
      tags: [system]
      summary: 审计日志最近条目

  /api/v1/firewall/apply:
    post:
      tags: [nat]
      summary: 应用待定的防火墙规则变更
      description: 将 pending 草稿写入 state 并 reload nft；存在 compliance/nft 错误时返回 422。
      responses:
        '200':
          description: 已应用或无待应用变更
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/firewall/discard:
    post:
      tags: [nat]
      summary: 放弃待定的防火墙规则变更
      responses:
        '200':
          description: 已恢复为当前已应用规则集

  /api/v1/firewall/session-limit:
    get:
      tags: [nat]
      summary: 每 IP 出站 conntrack 会话上限配置
      responses:
        '200':
          description: max_sessions_per_ip 与自动聚合的 session_limit_cidrs
    put:
      tags: [nat]
      summary: 设置每 IP 出站 conntrack 会话上限（需 root，立即 reload nft）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [max_sessions_per_ip]
              properties:
                max_sessions_per_ip:
                  type: integer
                  minimum: 0
                  maximum: 100000
                  description: 0=关闭；1–100000 为每源 IP 最大并发 NAT 会话数
      responses:
        '200':
          description: 已保存并应用

  /api/v1/firewall/rules:
    get:
      tags: [nat]
      summary: 防火墙规则列表（含自动同步规则与 nft 预览）
      responses:
        '200':
          description: 规则、nft_lines、rendered 完整 ruleset 等
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallRulesListResponse'
    post:
      tags: [nat]
      summary: 添加自定义规则（暂存，需 Apply 生效）
      description: 写入 pending 草稿，不 reload nft。`dry_run=1` 时仅 nft 预检。
      parameters:
        - name: dry_run
          in: query
          schema: { type: string, enum: ['1', 'true', 'yes'] }
          description: 仅 nft 语法检查，不持久化
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterRule'
      responses:
        '200':
          description: 创建成功；dry_run 时返回 DryRunOk（含 nft_line）
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok: { type: boolean }
                      id: { type: string }
                      rule: { $ref: '#/components/schemas/FilterRule' }
                  - $ref: '#/components/schemas/DryRunOk'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: nft 预检失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [nat]
      summary: 更新自定义规则（query id）
      description: 支持 `dry_run=1` 仅预检。
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
        - name: dry_run
          in: query
          schema: { type: string, enum: ['1', 'true', 'yes'] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterRule'
      responses:
        '200':
          description: 更新成功；dry_run 时返回 DryRunOk
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok: { type: boolean }
                      rule: { $ref: '#/components/schemas/FilterRule' }
                  - $ref: '#/components/schemas/DryRunOk'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: nft 预检失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: 系统/自动规则不可修改
        '404':
          description: 规则不存在
    delete:
      tags: [nat]
      summary: 删除自定义规则（query id）
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '403':
          description: 系统/自动规则不可删除
        '404':
          description: 规则不存在

  /api/v1/firewall/rules/order:
    put:
      tags: [nat]
      summary: 调整防火墙规则顺序
      description: |
        请求体 `order` 为可编辑规则 `id` 数组（可不含 auto-* / sys-*）。
        未出现在 order 中的用户规则保持相对顺序并追加在末尾；保存前 nft 预检，失败则不写入。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items: { type: string }
                  description: 用户规则 id 的新顺序
      responses:
        '200':
          description: 排序成功，返回完整 rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  rules: { type: array, items: { $ref: '#/components/schemas/FilterRule' } }
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/firewall/aliases:
    get:
      tags: [nat]
      summary: 防火墙别名（nft 对象组）列表
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  aliases: { type: array, items: { $ref: '#/components/schemas/FirewallAliasSet' } }
    post:
      tags: [nat]
      summary: 添加或覆盖 ipv4_addr / fqdn 别名集
      description: |
        同名则覆盖；保存前 nft 预检。
        type=ipv4_addr：members 为 IPv4/CIDR，或设 url 拉取 CIDR 列表。
        type=fqdn：domains 为域名列表，和/或设 url 拉取域名列表；网关主动解析 A 记录写入 members（无需客户端使用网关 DNS）；不支持通配符。
        type=asn 暂不支持。
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirewallAliasSet'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  name: { type: string }
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [nat]
      summary: 删除别名（query name）
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '409':
          description: 仍有防火墙规则引用该别名
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/firewall/aliases/refresh:
    post:
      tags: [nat]
      summary: 刷新 URL 或 FQDN 别名 members
      description: 刷新后若成员变化，会按旧 members 清理并重放出站策略 ip rule，再重载 nft。
      parameters:
        - name: name
          in: query
          schema: { type: string }
          description: 指定别名；省略则刷新所有带 url 或 fqdn domains/url 的别名
      responses:
        '200':
          description: ok

  /api/v1/system/mark-policy:
    get:
      tags: [system]
      summary: nft mark 与 QoS 隔离审计
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/interfaces:
    get:
      tags: [network]
      summary: 网卡列表、link_speed_mbps（sysfs/ethtool）、traffic 与 traffic_history（约 4h）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  dev_lan: { type: string }
                  dev_wan: { type: string }
                  netplan_path: { type: string }
                  interfaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/IfaceListItem'
                  managed_ifaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/IfaceManagedConfig'
                  traffic_history:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrafficPoint'
    put:
      tags: [network]
      summary: 修改网卡 IPv4 / up / dhcp4（写入 state 与 netplan 并 apply）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [device]
              properties:
                device:
                  type: string
                  description: Linux 网卡名（1–15 字符，字母数字与 `._-`，禁止 `/`）
                ipv4: { type: array, items: { type: string }, description: 完整替换托管地址列表；[] 清空静态地址 }
                up: { type: boolean }
                dhcp4: { type: boolean }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [network]
      summary: 停止托管指定网卡（从 99-qosnat2.yaml / state.ifaces 移除）
      parameters:
        - name: device
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '404':
          description: 该网卡不在托管列表中

  /api/v1/interfaces/roles:
    put:
      tags: [network]
      summary: 设置 LAN/WAN 网卡角色
      description: |
        写入 `/etc/qosnat2/dev_roles` 并更新进程内 `dev_lan` / `dev_wan`。
        `apply` 默认为 true：同时 netplan apply 并回放 QoS/NFT 数据面。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dev_wan]
              properties:
                dev_lan: { type: string, description: 可为空（仅 WAN 场景） }
                dev_wan: { type: string }
                apply: { type: boolean, default: true }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '400':
          description: 网卡不存在或 LAN/WAN 相同

  /api/v1/interfaces/queues:
    get:
      tags: [system]
      summary: RSS / 多队列 / softirq
      parameters:
        - name: dev
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/interfaces/ethtool:
    get:
      tags: [network]
      summary: 读取 ethtool ring 与 offload
      parameters:
        - name: device
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EthtoolInfo'
    put:
      tags: [network]
      summary: 设置 ring 或 offload（ethtool -G / -K）
      parameters:
        - name: device
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EthtoolPut'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  ethtool:
                    $ref: '#/components/schemas/EthtoolInfo'

  /api/v1/network/virtual-ips:
    get:
      tags: [network]
      summary: 虚拟 IP（IP Alias）列表，供 NAT / 端口转发绑定
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  virtual_ips:
                    type: array
                    items:
                      $ref: '#/components/schemas/VirtualIP'
