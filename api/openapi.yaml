              schema:
                type: object
                additionalProperties: true
    put:
      tags: [nat]
      summary: 更新 NAT64/DNS64 并 apply（Jool + Unbound + dnsmasq）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nat64_enabled: { type: boolean }
