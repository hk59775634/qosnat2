openapi: 3.0.3
info:
  title: qosnat2 API
  description: |
    单机双网卡 QoS（HTB + eBPF + IFB）+ NAT（nftables）+ VPN（WireGuard / ocserv）控制面 REST API。

    **鉴权**：除 `GET /api/v1/health`、`GET /openapi.yaml`、`/api/v1/setup/*` 与 `POST /api/v1/login` 外，需 Session Cookie `qosnat_sess` 或请求头 `X-API-Key`（实验性，见 `/api/v1/api-keys`）。API Key 可设 `role: readonly`，只读密钥禁止写操作（403 `AUTH_READ_ONLY`）。

    **交互文档**：Web UI → 开发 → API (Scalar)，或 `GET /openapi.yaml`。中文说明索引见仓库 `docs/API-ZH.md`。

    **功能域（tags）**：
    - `health` / `setup` / `auth`：健康检查、首次引导、登录与会话
    - `network`：网卡、VLAN/VXLAN、多 WAN、netplan 预览与应用
    - `nat`：SNAT/DNAT、防火墙规则与别名对象组
    - `shaper`：QoS 模板、租户、HTB 叶子队列
    - `stats` / `ebpf` / `system`：仪表盘、BPF、sysctl/HTTPS/审计
    - `vpn`：WireGuard、ocserv（OpenConnect）含虚拟主机与独立用户
    - `diagnostics`：tcpdump 抓包、conntrack 列表

    **ocserv 常用流程**：
    1. `GET /api/v1/vpn/ocserv` 读取配置与 `install_job` / `status`
    2. `PUT` 保存 state（密码/RADIUS 密钥留空表示不修改）
    3. `POST /api/v1/vpn/ocserv/apply` 写入 `ocserv.conf`；运行中仅 `reload`，冷启动用 `start`，关闭用 `stop`+`disable`（非 reload 生效项见 GET `restart_pending_reasons`）
    4. `POST /api/v1/vpn/ocserv/service`：`start` / `stop` / `restart`（需 root）
    5. 虚拟主机：`/api/v1/vpn/ocserv/vhosts`；独立密码文件用户：`/api/v1/vpn/ocserv/vhosts/users?domain=`
    6. 安装：`POST .../install`（202，需 root；源码编译）→ 轮询 `GET .../install/status`
    7. 卸载：`POST .../uninstall`（需 root + Web 管理员密码 `admin_password`）

    **带宽字段（ocserv）**：`rx-data-per-sec` / `tx-data-per-sec` 为**服务端视角**（限制客户端上行用 `tx-data-per-sec`）。Web UI 已按「客户端上/下行」展示并映射到上述字段。
  version: 1.0.0
  contact:
    name: qosnat2

servers:
  - url: /
    description: 当前 qosnatd 实例

tags:
  - name: health
    description: 健康检查与 OpenAPI 规范下载
  - name: auth
    description: 登录、会话、API Key（实验性）
  - name: setup
    description: 首次引导（无需登录）
  - name: network
    description: 网卡、角色、VLAN/VXLAN、多 WAN、netplan
  - name: nat
    description: SNAT/DNAT 策略、防火墙 filter 规则与别名
  - name: shaper
    description: QoS 模板、租户、活动主机、TC 叶子队列
  - name: stats
    description: 仪表盘聚合指标
  - name: ebpf
    description: BPF Map/程序状态与重载
  - name: system
    description: sysctl 调优、常规设置、HTTPS/ACME、审计、RSS 队列
  - name: vpn
    description: WireGuard 与 ocserv（OpenConnect），含 vhost 与流量统计
  - name: diagnostics
    description: 抓包与 conntrack 诊断

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: qosnat_sess
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Ok:
      type: object
      properties:
        ok:
          type: boolean
    DynamicRoutingState:
      type: object
      properties:
        bgp:
          type: object
          properties:
            enabled: { type: boolean }
            asn: { type: integer, format: int64 }
            router_id: { type: string }
            neighbors:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  address: { type: string }
                  remote_asn: { type: integer, format: int64 }
                  description: { type: string }
                  update_source: { type: string }
                  password: { type: string }
                  enabled: { type: boolean }
            networks:
              type: array
              items: { type: string }
            redistribute_connected: { type: boolean }
        ospf:
          type: object
          properties:
            enabled: { type: boolean }
            router_id: { type: string }
            networks:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  prefix: { type: string }
                  area: { type: string }
                  enabled: { type: boolean }
            redistribute_connected: { type: boolean }
    Error:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
        code:
          type: string
          description: 机器可读错误码（如 FIREWALL_NFT_INVALID、AUTH_READ_ONLY）
    OpsMetricBlock:
      type: object
      properties:
        total: { type: integer, format: int64 }
        last_ms: { type: number, format: double }
        last_error: { type: string }
        last_at: { type: string, format: date-time }
    OpsMetricsResponse:
      type: object
      properties:
        conntrack_count: { type: integer }
        conntrack_max: { type: integer }
        cpu_percent: { type: number }
        mem_percent: { type: number }
        nft_reload:
          $ref: '#/components/schemas/OpsMetricBlock'
        nat_stack_apply:
          $ref: '#/components/schemas/OpsMetricBlock'
    DryRunOk:
      type: object
      properties:
        ok: { type: boolean }
        dry_run: { type: boolean }
        nft_valid: { type: boolean }
        nft_line: { type: string }
        rule:
          $ref: '#/components/schemas/FilterRule'
    RateLimit:
      type: object
      properties:
        down:
          type: string
          example: 8mbit
        up:
          type: string
          example: 8mbit
    HostRate:
      allOf:
        - $ref: '#/components/schemas/RateLimit'
    DHCPState:
      type: object
      properties:
        enabled: { type: boolean }
        dns_enabled: { type: boolean, description: 启用 dnsmasq LAN DNS（port 53）；可与 enabled 独立组合 }
        interface: { type: string, description: 绑定网卡，默认 DEV_LAN }
        range_start: { type: string }
        range_end: { type: string }
        router: { type: string }
        netmask: { type: string }
        domain: { type: string }
        dns_servers: { type: array, items: { type: string }, description: DHCP option 6 下发给客户端 }
        upstream_dns:
          type: array
          items: { type: string }
          description: dnsmasq server= 转发上游；空则使用系统 resolv.conf
        chnroutes_enabled:
          type: boolean
          description: 启用 chnroutes 国内外 DNS 分流（需 patched dnsmasq）
        chnroutes_file:
          type: string
          description: chnroutes CIDR 列表路径，默认 /etc/qosnat2/chnroutes.txt
        trusted_dns:
          type: array
          items: { type: string }
          description: 国内 DNS，写入 server=,1
        untrusted_dns:
          type: array
          items: { type: string }
          description: 国外 DNS，写入 server=,0
        lease_time_sec: { type: integer }
        authoritative: { type: boolean }
        static_leases:
          type: array
          items:
            type: object
            properties:
              mac: { type: string }
              ip: { type: string }
              hostname: { type: string }
              router: { type: string, description: 覆盖默认网关（DHCP option 3） }
              dns_servers:
                type: array
                items: { type: string }
                description: 覆盖默认 DNS（DHCP option 6）
              comment: { type: string }
    SNMPState:
      type: object
      properties:
        enabled: { type: boolean }
        port: { type: integer, default: 161 }
        listen_localhost_only: { type: boolean, description: '已废弃，始终监听 0.0.0.0' }
        sys_location: { type: string }
        sys_contact: { type: string }
        sys_name: { type: string }
        ro_community: { type: string, description: SNMPv2c 只读 community }
        allowed_networks:
          type: array
          items: { type: string }
          description: 允许查询的源 CIDR 列表
    RouteEntry:
      type: object
      properties:
        id: { type: string }
        dest: { type: string, example: "10.0.0.0/8" }
        gateway: { type: string }
        device: { type: string }
        table: { type: integer, description: "0/254 为 main；策略出站为 201 起的独立路由表" }
        metric: { type: integer }
        comment: { type: string, description: "内部标记；qosnat-wan: / qosnat-egress: 为自动同步" }
        enabled: { type: boolean }
        source: { type: string, enum: [manual, wan, egress], description: "manual=本页添加；wan=多 WAN；egress=策略出站" }
        source_note: { type: string, description: "只读说明，区分相似 default 路由" }
        locked: { type: boolean, description: "true 时不可在本页删除或编辑，请在多 WAN 管理" }
    WanPortForward:
      type: object
      properties:
        id: { type: string }
        interface: { type: string, description: 入接口，默认 DEV_WAN }
        ip_version: { type: string, enum: [ipv4, ipv6] }
        proto: { type: string, enum: [tcp, udp, tcp_udp] }
        src_addr: { type: string, example: "0.0.0.0/0" }
        dst_addr: { type: string, description: 目标地址，空为任意 }
        dst_port: { type: integer }
        redirect_ip: { type: string }
        redirect_port: { type: integer }
        comment: { type: string }
    FilterRule:
      type: object
      properties:
        id: { type: string, description: "用户规则 fr-*；自动规则 auto-* / auto-fwd-*；不可改 sys-*" }
        chain: { type: string, enum: [forward, input] }
        action: { type: string, enum: [accept, drop, reject] }
        iif: { type: string, description: 入接口 iifname }
        oif: { type: string, description: forward 链出接口 oifname；input 链忽略 }
        proto: { type: string, enum: [tcp, udp, icmp, icmpv6, sctp, udplite], description: 空表示任意 }
        src_addr: { type: string, description: IPv4/IPv6 地址或 CIDR（与 ip_version 一致） }
        dst_addr: { type: string }
        src_alias: { type: string, description: 引用 firewall/aliases 中的 ipv4_addr 集 }
        dst_alias: { type: string }
        src_port: { type: integer, minimum: 0, maximum: 65535, description: "0 表示任意" }
        dst_port: { type: integer, minimum: 0, maximum: 65535 }
        comment: { type: string, description: 写入 nft comment 字段 }
        enabled: { type: boolean }
        ip_version: { type: string, enum: [ipv4, ipv6], description: 默认 ipv4；影响 nft ip/ip6 匹配 }
        system: { type: boolean, description: true 表示平台受管规则，不可 PUT/DELETE }
    FirewallAliasSet:
      type: object
      required: [name]
      properties:
        name: { type: string }
        type: { type: string, enum: [ipv4_addr, fqdn], description: "asn 类型暂不支持；fqdn 由网关解析 A 记录写入 members" }
        members: { type: array, items: { type: string }, description: IPv4 地址或 CIDR（fqdn 类型为解析结果） }
        domains: { type: array, items: { type: string }, description: 'type=fqdn 时的域名列表（不支持通配符）' }
        url: { type: string, description: '从 URL 拉取列表（每行一条）：ipv4_addr 为 CIDR；fqdn 为域名' }
        url_fetched_at: { type: string, description: '上次 URL 拉取时间 RFC3339' }
        resolved_at: { type: string, description: '上次 FQDN 解析时间 RFC3339' }
        asn: { type: integer, deprecated: true }
        comment: { type: string }
    FirewallRulesListResponse:
      type: object
      properties:
        rules:
          type: array
          items: { $ref: '#/components/schemas/FilterRule' }
        nft_lines:
          type: object
          additionalProperties: { type: string }
          description: 规则 id 到单行 nft filter 语法；disabled 规则无条目
        dev_lan: { type: string }
        dev_wan: { type: string }
        admin_port: { type: string }
        interfaces: { type: array, items: { type: object } }
        alias_names: { type: array, items: { type: string } }
        vpn: { type: object }
        acme_temp_allow_http01: { type: boolean }
        acme_temp_allow_http01_ips:
          type: array
          items: { type: string }
          description: HTTP-01 期间临时放行的本机目标 IPv4（域名 DNS 与本机地址交集）
        max_sessions_per_ip:
          type: integer
          description: 每内网源 IP 最大出站 conntrack 会话数；0=不限制
        session_limit_cidrs:
          type: array
          items: { type: string }
          description: 自动纳入会话上限监控的源网段列表
        rendered: { type: string, description: 完整 inet qosnat ruleset 文本预览 }
    NatIPv4State:
      type: object
      properties:
        policy_routes: { type: array, items: { type: string } }
        shared_ips: { type: array, items: { type: string } }
        static_mappings: { type: object, additionalProperties: { type: string } }
        prefix_mappings: { type: object, additionalProperties: { type: string } }
    Nptv6Rule:
      type: object
      required: [internal_prefix, external_prefix]
      properties:
        id: { type: string }
        internal_prefix: { type: string, example: "fd00:1111:2222::/48" }
        external_prefix: { type: string, example: "2001:db8:aaaa::/48" }
        description: { type: string }
        oif: { type: string, description: 出口网卡，空则 DEV_WAN }
    DNS64Config:
      type: object
      properties:
        mode: { type: string, enum: [local_unbound, upstream], default: local_unbound }
        upstream:
          type: array
          items: { type: string, format: ipv6 }
          description: mode=upstream 时下发给客户端的 DNS64 解析器
        unbound_listen: { type: string, example: "127.0.0.1:5353" }
        forwarders:
          type: array
          items: { type: string }
          description: Unbound 递归上游
        serve_to_clients: { type: boolean, default: true, description: 'false=VPN/static DNS, no dnsmasq/DHCP' }
        access_allow:
          type: array
          items: { type: string }
          description: Unbound access-control when serve_to_clients is false
    NatState:
      type: object
      properties:
        ipv4: { $ref: '#/components/schemas/NatIPv4State' }
        nptv6_enabled: { type: boolean }
        nptv6_rules:
          type: array
          items: { $ref: '#/components/schemas/Nptv6Rule' }
        nat64_enabled: { type: boolean }
        nat64_prefix: { type: string, example: "64:ff9b::/96" }
        nat64_pool4: { type: string, example: "10.255.255.0/24" }
        dns64: { $ref: '#/components/schemas/DNS64Config' }
    Health:
      type: object
      properties:
        ok: { type: boolean }
        service: { type: string }
        phase: { type: string }
        dev_lan: { type: string }
        dev_wan: { type: string }
        bpf: { type: boolean }
        tc_attach: { type: boolean }
        setup_complete: { type: boolean }
        setup_required: { type: boolean }
        tls_enabled: { type: boolean }
        tls_active: { type: boolean }
        suggest_https: { type: boolean, description: 已配置 HTTPS 但进程仍监听 HTTP，需重启 qosnatd }
        admin_port: { type: string }
    TLSStatus:
      type: object
      properties:
        tls_enabled: { type: boolean }
        tls_active: { type: boolean }
        cert_path: { type: string }
        key_path: { type: string }
        has_cert_file: { type: boolean }
        has_key_file: { type: boolean }
        cert_subject: { type: string }
        cert_not_after: { type: string, format: date-time }
        acme_enabled: { type: boolean }
        domain: { type: string }
        acme_email: { type: string }
        acme_staging: { type: boolean }
        acme_renew_days: { type: integer }
        acme_last_ok: { type: string }
        acme_last_error: { type: string }
        managed_cert_id: { type: string, description: 关联的证书库条目 ID }
    ManagedCertificate:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [manual, acme] }
        domains: { type: array, items: { type: string } }
        cert_path: { type: string }
        key_path: { type: string }
        ca_path: { type: string }
        subject: { type: string }
        not_after: { type: string, format: date-time }
        acme_email: { type: string }
        acme_staging: { type: boolean }
        acme_renew_days: { type: integer, description: 到期前自动续期阈值（天）：域名库内默认 30、服务绑定 7；公网 IP 短期证（全周期约 7 天）库内与服务绑定均默认 3，且保存时大于 5 的值会规范为 3 }
        acme_last_error: { type: string }
        auto_renew_enabled: { type: boolean }
        auto_renew_paused: { type: boolean }
        auto_renew_pause_reason: { type: string, description: 暂停原因（含 DNS 解析说明） }
        days_until_expiry: { type: integer }
        in_use:
          type: array
          items:
            type: object
            properties:
              place: { type: string }
              label: { type: string }
    GeneralSettings:
      type: object
      properties:
        hostname: { type: string }
        admin_user: { type: string }
        dev_lan: { type: string }
        dev_wan: { type: string }
        setup_complete: { type: boolean }
        tls:
          $ref: '#/components/schemas/TLSStatus'
    GeneralSettingsPut:
      type: object
      properties:
        hostname: { type: string }
        new_password: { type: string, minLength: 8 }
        current_password: { type: string }
        tls_enabled: { type: boolean }
        tls_cert: { type: string, description: PEM 证书 }
        tls_key: { type: string, description: PEM 私钥 }
        tls_domain: { type: string }
        tls_acme_enabled: { type: boolean }
        tls_acme_email: { type: string }
        tls_acme_staging: { type: boolean }
        tls_acme_renew_days: { type: integer }
        tls_managed_cert_id: { type: string, description: 使用证书库中的证书；空字符串表示本页 ACME/上传 }
    ReleaseVersionItem:
      type: object
      properties:
        tag: { type: string, example: '2026052801', description: 10 位版本号 }
        name: { type: string }
        summary: { type: string, description: 一句话更新概要 }
        notes_url: { type: string, description: 完整更新说明 raw URL }
        github_tag: { type: string, example: v2026052801 }
        prerelease: { type: boolean }
        published_at: { type: string, format: date-time }
    SystemVersionSwitchJob:
      type: object
      description: 版本切换后台任务状态（持久化于 /var/lib/qosnat2/version-switch-status.json）
      properties:
        state:
          type: string
          enum: [idle, running, ok, failed]
          description: idle=无任务；running=下载/安装中；ok=成功（服务可能正在重启）；failed=失败
        message: { type: string, description: 人类可读状态说明 }
        target_tag: { type: string, example: '2026052801', description: 目标版本号 }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        result:
          type: object
          additionalProperties: true
          description: 成功时附加字段（如 tag、message）
    SystemVersionStatus:
      type: object
      properties:
        binary_path: { type: string, example: /usr/local/bin/qosnatd }
        current_tag: { type: string, example: '2026052801', description: 10 位版本号 YYYYMMDDNN }
        current_version: { type: string, description: 构建版本字符串（来自 buildinfo 或 --version） }
        root_required: { type: boolean, description: 当前进程是否具备 root 以执行版本切换 }
        list_error: { type: string, description: 拉取版本清单失败时返回 }
        manifest_url: { type: string, description: GitHub raw 版本清单 URL }
        releases:
          type: array
          items: { $ref: '#/components/schemas/ReleaseVersionItem' }
        switch_task:
          $ref: '#/components/schemas/SystemVersionSwitchJob'
          description: 当前或最近一次版本切换任务（与 GET /system/version/switch/status 相同结构）
        download_routes:
          type: array
          description: 可选下载线路（含多 WAN 出口，按已配置链路动态生成）
          items: { $ref: '#/components/schemas/VersionDownloadRoute' }
        default_download_route:
          type: string
          example: direct
          description: 默认下载线路 id
    VersionDownloadRoute:
      type: object
      properties:
        id:
          type: string
          enum: [direct, gh_proxy_v4, gh_proxy_cdn, wan_1, wan_2]
        wan_index: { type: integer, description: 多 WAN 时出口序号 1 或 2 }
        wan_link_id: { type: string }
        wan_name: { type: string }
        device: { type: string }
        gateway: { type: string }
    SystemVersionSwitchPut:
      type: object
      required: [tag]
      properties:
        tag: { type: string, example: '2026052801', description: 10 位版本号 YYYYMMDDNN }
        download_route:
          type: string
          enum: [direct, gh_proxy_v4, gh_proxy_cdn, wan_1, wan_2]
          default: direct
          description: |
            下载线路：直连、gh-proxy 镜像，或多 WAN 出口（wan_1/wan_2 为按 Tier 排序的第 1/2 条非 WARP 链路；
            切换前解析 GitHub 相关域名并添加临时目的地址策略，完成后自动删除）。
        current_password:
          type: string
          description: |
            管理员当前密码。若已通过 POST /system/version/switch/verify 在同一会话内短时授权（约 2 分钟），
            可省略本字段；否则必填。
    SystemVersionSwitchAccepted:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string, example: 版本切换已在后台开始 }
        tag: { type: string, example: '2026052801' }
        download_route: { type: string, example: direct }
        job: { $ref: '#/components/schemas/SystemVersionSwitchJob' }
    OCServInstallPut:
      type: object
      properties:
        version:
          type: string
          example: '1.4.2'
          description: 可选，ocserv 官方源码 tag（默认 1.4.2）
    IfaceAddr:
      type: object
      properties:
        family: { type: string }
        cidr: { type: string }
        scope: { type: string }
    IfaceTraffic:
      type: object
      properties:
        rx_mbps: { type: number }
        tx_mbps: { type: number }
    IfaceListItem:
      type: object
      properties:
        name: { type: string }
        up: { type: boolean }
        operstate: { type: string }
        mac: { type: string }
        addrs: { type: array, items: { $ref: '#/components/schemas/IfaceAddr' } }
        link_speed_mbps: { type: integer, description: 协商线速 Mbps，0=未知 }
        role: { type: string, enum: [LAN, WAN] }
        traffic: { $ref: '#/components/schemas/IfaceTraffic' }
        rss_channels: { type: integer }
        netplan_manageable: { type: boolean, description: 是否可经 PUT 写入 99-qosnat2.yaml ethernets }
        managed:
          allOf:
            - $ref: '#/components/schemas/IfaceManagedConfig'
          nullable: true
          description: qosnat2 期望配置（持久化）；空表示尚未由本系统托管
    IfaceManagedConfig:
      type: object
      properties:
        device: { type: string }
        ipv4: { type: array, items: { type: string } }
        up: { type: boolean }
        dhcp4: { type: boolean }
    VirtualIP:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [ip_alias] }
        interface: { type: string }
        address: { type: string }
        comment: { type: string }
        enabled: { type: boolean }
        host: { type: string, description: 主机 IP（不含前缀） }
        assigned: { type: boolean, description: 当前是否已出现在接口地址中 }
    TrafficPoint:
      type: object
      properties:
        ts: { type: integer, format: int64 }
        lan_rx_mbps: { type: number }
        lan_tx_mbps: { type: number }
        wan_rx_mbps: { type: number }
        wan_tx_mbps: { type: number }
        cpu_percent: { type: number }
        conntrack: { type: integer }
    EthtoolRing:
      type: object
      properties:
        rx_max: { type: integer }
        rx_current: { type: integer }
        tx_max: { type: integer }
        tx_current: { type: integer }
    EthtoolOffloads:
      type: object
      properties:
        gro: { type: string }
        gso: { type: string }
        tx_checksum: { type: string }
        rx_checksum: { type: string }
    EthtoolInfo:
      type: object
      properties:
        device: { type: string }
        ring: { $ref: '#/components/schemas/EthtoolRing' }
        offloads: { $ref: '#/components/schemas/EthtoolOffloads' }
    EthtoolPut:
      type: object
      properties:
        rx_ring: { type: integer }
        tx_ring: { type: integer }
        offloads: { $ref: '#/components/schemas/EthtoolOffloads' }
    VLANIface:
      type: object
      properties:
        id: { type: string }
        parent: { type: string }
        vid: { type: integer, minimum: 1 }
        name: { type: string }
        ipv4: { type: array, items: { type: string } }
        up: { type: boolean }
    TenantEntry:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        cidrs: { type: array, items: { type: string } }
        down: { type: string, example: 50mbit }
        up: { type: string, example: 50mbit }
        device: { type: string }
    VXLANTunnel:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        vni: { type: integer }
        local: { type: string }
        remote: { type: string }
        port: { type: integer, default: 4789 }
        underlay: { type: string }
        ipv4: { type: array, items: { type: string } }
        up: { type: boolean }
    WanLink:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        device: { type: string }
        gateway: { type: string }
        metric: { type: integer }
        tier: { type: integer }
        weight: { type: integer, description: ECMP 权重（同 metric 多 nexthop） }
        policy_only: { type: boolean }
        enabled: { type: boolean }
        warp_managed: { type: boolean }
        proxy_managed: { type: boolean, description: '由 ProxyEgress/sing-box 自动创建' }
    ProxyEgress:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [socks5, http, https] }
        server: { type: string }
        port: { type: integer }
        username: { type: string }
        password: { type: string }
        tun_index: { type: integer }
        enabled: { type: boolean, description: '启用意图；断线后 watchdog 重连' }
        egress_ip: { type: string }
        egress_country: { type: string }
        egress_city: { type: string }
        egress_region: { type: string }
        egress_org: { type: string }
        egress_checked_at: { type: string }
        last_test_error: { type: string }
    EgressPolicy:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        cidr: { type: string, description: '旧版单 CIDR（兼容）' }
        match: { type: string, enum: [source, destination], description: '旧版匹配方向（兼容）' }
        src_cidr: { type: string }
        dst_cidr: { type: string }
        src_alias: { type: string, description: '源地址别名' }
        dst_alias: { type: string, description: '目标地址别名' }
        src_iface: { type: string, description: '入接口 iif，可与源地址组合' }
        wan_link_id: { type: string, description: '绑定的 WanLink.id' }
        snat_ip: { type: string, description: '出站 SNAT 地址，空则使用该 WAN 口首个全球 IPv4' }
        priority: { type: integer, description: 'ip rule 优先级，默认 100' }
        enabled: { type: boolean }
    ResolvedEgress:
      type: object
      properties:
        policy: { $ref: '#/components/schemas/EgressPolicy' }
        wan_link: { $ref: '#/components/schemas/WanLink' }
        device: { type: string }
        gateway: { type: string }
        table: { type: integer, description: Linux 路由表号（201 起） }
        snat_ip: { type: string }
        priority: { type: integer }
    ShaperTC:
      type: object
      properties:
        enabled: { type: boolean }
        root_qdisc: { type: string, enum: [fq] }
        fq_flows: { type: integer }
        fq_quantum: { type: integer }
    ShaperTCPut:
      type: object
      properties:
        fq_flows: { type: integer }
        fq_quantum: { type: integer }
        apply: { type: boolean, description: true 时重建 TC 数据面 }
    WGPeer:
      type: object
      required: [name, public_key]
      properties:
        name: { type: string }
        public_key: { type: string }
        private_key: { type: string, description: 客户端私钥，导出 conf 用 }
        allowed_ips:
          type: array
          items: { type: string }
        endpoint: { type: string }
        persistent_keepalive: { type: integer }
        preshared_key: { type: string }
        rate:
          $ref: '#/components/schemas/HostRate'
        total_rx_bytes: { type: integer, description: 历史累计 RX（采样持久化，GET 配置时附带） }
        total_tx_bytes: { type: integer, description: 历史累计 TX }
        total_bytes: { type: integer }
    WireGuardConfig:
      type: object
      properties:
        enabled: { type: boolean }
        interface: { type: string, example: wg0 }
        listen_port: { type: integer }
        address: { type: string }
        private_key: { type: string }
        public_key: { type: string }
        dns:
          type: array
          items: { type: string }
        server_endpoint: { type: string }
        peers:
          type: array
          items:
            $ref: '#/components/schemas/WGPeer'
        server_private_key_set: { type: boolean, description: GET 展示用；PUT 时忽略 }
    WireGuardInstance:
      description: WireGuard 多实例条目（JSON 扁平：id/name/mode 与隧道字段并列）
      allOf:
        - $ref: '#/components/schemas/WireGuardConfig'
        - type: object
          required: [id, mode]
          properties:
            id: { type: string, example: default }
            name: { type: string }
            mode: { type: string, enum: [server, client] }
    WireGuardInstanceSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        mode: { type: string, enum: [server, client] }
        enabled: { type: boolean }
        interface: { type: string }
        listen_port: { type: integer }
        status:
          type: object
          additionalProperties: true
    OCServUser:
      type: object
      properties:
        username: { type: string }
        password: { type: string, description: 仅 POST 创建/改密；GET 不返回 }
        group: { type: string }
        comment: { type: string }
    OCServGroup:
      type: object
      required: [name]
      properties:
        name: { type: string }
        label: { type: string, description: select-group 展示名 }
        comment: { type: string }
        dns:
          type: array
          items: { type: string }
        routes:
          type: array
          items: { type: string }
        no_routes:
          type: array
          items: { type: string }
        ipv4_network: { type: string }
        ipv4_netmask: { type: string }
        rx_data_per_sec: { type: integer, description: 服务端下行限速（字节/秒，0=不限） }
        tx_data_per_sec: { type: integer, description: 服务端上行限速（限制客户端上传） }
        mtu: { type: integer }
        tunnel_all_dns: { type: boolean }
        omit_select_group:
          type: boolean
          description: true 时仅写入 config-per-group，不在 ocserv.conf 列出 select-group
    OCServInstallJobStatus:
      type: object
      description: ocserv 源码安装后台任务（GET install/status 与 GET ocserv 内 install_job）
      properties:
        state:
          type: string
          enum: [idle, running, ok, failed]
          description: idle=无任务；running=安装中；ok/failed=已结束
        message: { type: string, description: 人类可读状态说明 }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        log_tail: { type: string, description: 安装日志末尾约 80 行 }
        script: { type: string, description: 执行的 bash 安装脚本路径 }
    OCServVhost:
      type: object
      description: |
        ocserv 虚拟主机 `[vhost:domain]`。新建时服务端可用全局配置种子化默认值（`VhostFromGlobal`）。
        认证：`auth_method` 空=继承全局；`plain` 可设 `plain_passwd_path` 独立 ocpasswd；`radius` 且 `radius.server` 非空则写 `/etc/radcli/vhosts/<domain>.conf`。
      required: [domain]
      properties:
        enabled: { type: boolean, description: 是否启用该 vhost }
        domain: { type: string, description: 客户端连接域名（SNI/Host） }
        comment: { type: string }
        auth_method:
          type: string
          enum: ['', plain, radius, certificate]
          description: 空=继承全局 auth_method
        plain_passwd_path:
          type: string
          description: plain 专用密码文件；空则使用全局 ocpasswd。非空时可用 vhosts/users API 管理用户
        users:
          type: array
          description: 仅 plain_passwd_path 非空时写入该文件；GET 列表不返回密码
          items:
            $ref: '#/components/schemas/OCServUser'
        radius:
          $ref: '#/components/schemas/OCServRadius'
        managed_cert_id: { type: string, description: 证书库条目 ID；空则继承全局或使用路径字段 }
        server_cert_path: { type: string }
        server_key_path: { type: string }
        ca_cert_path: { type: string }
        crl_path: { type: string }
        dh_params_path: { type: string }
        tls_priorities: { type: string }
        cert_user_oid: { type: string }
        cert_group_oid: { type: string }
        ipv4_network: { type: string }
        ipv4_netmask: { type: string }
        ipv6_network: { type: string }
        ipv6_prefix: { type: integer }
        dns:
          type: array
          items: { type: string }
        nbns:
          type: array
          items: { type: string }
        default_domain: { type: string }
        tunnel_all_dns: { type: boolean }
        mtu: { type: integer }
        routes:
          type: array
          items: { type: string }
        no_routes:
          type: array
          items: { type: string }
        iroutes:
          type: array
          items: { type: string }
        expose_iroutes: { type: boolean }
        rx_data_per_sec: { type: integer, description: 服务端下行限速（字节/秒） }
        tx_data_per_sec: { type: integer, description: 服务端上行限速（限制客户端上传） }
        pkt_mtu_size: { type: integer }
        idle_timeout: { type: integer }
        session_timeout: { type: integer }
        mobile_idle_timeout: { type: integer }
        max_same_clients: { type: integer }
        keepalive: { type: integer }
        dpd: { type: integer }
        mobile_dpd: { type: integer }
        cookie_timeout: { type: integer }
        deny_roaming: { type: boolean }
        persistent_cookies: { type: boolean }
        rekey_time: { type: integer }
        rekey_method: { type: string }
        compression: { type: boolean }
        predictable_ips: { type: boolean }
        dtls_legacy: { type: boolean }
        cisco_client_compat: { type: boolean }
        select_group_by_url: { type: boolean }
        cisco_svc_client_compat: { type: boolean }
        no_udp: { type: boolean }
        banner: { type: string }
        pre_login_banner: { type: string }
        camouflage: { type: boolean }
        camouflage_secret: { type: string, description: GET 不返回；PUT 留空不修改 }
        camouflage_realm: { type: string }
        config_per_user: { type: string }
        config_per_group: { type: string }
        default_user_config: { type: string }
        default_group_config: { type: string }
        select_groups:
          type: array
          items: { type: string }
        auto_select_group: { type: boolean }
        default_select_group: { type: string }
        connect_script: { type: string }
        disconnect_script: { type: string }
        acct_enabled: { type: boolean, description: 空/false 可继承全局 RADIUS 计费 }
        stats_report_time: { type: integer }
    OCServRadius:
      type: object
      properties:
        server: { type: string, description: RADIUS 服务器地址 }
        auth_port: { type: integer, example: 1812 }
        acct_port: { type: integer, example: 1813 }
        secret: { type: string, description: 共享密钥；GET 不返回 }
        groupconfig: { type: boolean, description: 从 RADIUS 读取用户/组配置 }
        nas_identifier: { type: string }
        acct_enabled: { type: boolean }
        stats_report_time: { type: integer, example: 360 }
        config_path: { type: string }
    OCServAdvanced:
      type: object
      description: ocserv 功能开关与高级参数
      properties:
        try_mtu_discovery: { type: boolean }
        isolate_workers: { type: boolean }
        dtls_legacy: { type: boolean }
        tcp: { type: boolean }
        udp: { type: boolean }
        deny_roaming: { type: boolean }
        cisco_client_compat: { type: boolean }
        select_group_by_url: { type: boolean }
        compression: { type: boolean }
        keepalive: { type: boolean }
        dpd: { type: boolean }
        mobile_dpd: { type: boolean }
        predictable_ips: { type: boolean }
        ping_leases: { type: boolean }
        use_occtl: { type: boolean }
        rekey: { type: boolean }
        switch_to_tcp: { type: boolean }
        camouflage: { type: boolean }
        cisco_svc_client_compat: { type: boolean }
        client_bypass_protocol: { type: boolean }
        max_same_clients: { type: integer }
        rekey_method: { type: string, enum: [ssl, new-tunnel] }
        rate_limit_ms: { type: integer }
        log_level: { type: integer }
        max_ban_score: { type: integer }
        ban_time: { type: integer }
        ban_reset_time: { type: integer }
        server_stats_reset_time: { type: integer }
        rx_data_per_sec: { type: integer, description: 全局默认：服务端下行限速（字节/秒） }
        tx_data_per_sec: { type: integer, description: 全局默认：服务端上行限速（限制客户端上传） }
        camouflage_realm: { type: string }
        default_domain: { type: string }
        config_per_group: { type: string }
        cert_user_oid: { type: string }
        tls_priorities: { type: string }
        keepalive_sec: { type: integer }
        dpd_sec: { type: integer }
        mobile_dpd_sec: { type: integer }
        cookie_timeout: { type: integer }
        rekey_time: { type: integer }
        auth_timeout: { type: integer }
        switch_to_tcp_timeout: { type: integer }
    OCServConfig:
      type: object
      properties:
        enabled: { type: boolean }
        auth_method: { type: string, enum: [plain, radius] }
        radius:
          $ref: '#/components/schemas/OCServRadius'
        advanced:
          $ref: '#/components/schemas/OCServAdvanced'
        tcp_port: { type: integer, example: 443 }
        udp_port: { type: integer }
        device: { type: string, example: vpns }
        ipv4_network: { type: string, example: 10.250.0.0 }
        ipv4_netmask: { type: string, example: 255.255.255.0 }
        dns:
          type: array
          items: { type: string }
        routes:
          type: array
          items: { type: string }
        no_routes:
          type: array
          items: { type: string }
        server_cert_path: { type: string }
        server_key_path: { type: string }
        ca_cert_path: { type: string }
        socket_file: { type: string }
        max_clients: { type: integer }
        use_qosnat_tls: { type: boolean, description: 使用 /etc/qosnat2/tls.* 作为服务端证书 }
        managed_cert_id: { type: string, description: 证书库条目 ID }
        server_cert: { type: string }
        server_key: { type: string }
        users:
          type: array
          items:
            $ref: '#/components/schemas/OCServUser'
        config_per_group: { type: string, example: /etc/ocserv/config-per-group/ }
        default_group_config: { type: string, example: /etc/ocserv/defaults/group.conf }
        auto_select_group: { type: boolean }
        groups:
          type: array
          items:
            $ref: '#/components/schemas/OCServGroup'
        vhosts:
          type: array
          items:
            $ref: '#/components/schemas/OCServVhost'
    ConntrackEntry:
      type: object
      properties:
        l3_proto: { type: string }
        protocol: { type: string }
        timeout_sec: { type: integer }
        state: { type: string }
        src: { type: string }
        dst: { type: string }
        sport: { type: integer }
        dport: { type: integer }
        reply_src: { type: string }
        reply_dst: { type: string }
        reply_sport: { type: integer }
        reply_dport: { type: integer }
        mark: { type: integer }
        flags: { type: string }
    ConntrackList:
      type: object
      properties:
        count: { type: integer, description: nf_conntrack_count }
        limit: { type: integer }
        truncated: { type: boolean }
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ConntrackEntry'

security:
  - sessionAuth: []
  - apiKeyAuth: []

paths:
  /openapi.yaml:
    get:
      tags: [health]
      summary: OpenAPI 规范（YAML）
      security: []
      responses:
        '200':
          description: YAML
          content:
            application/yaml: {}

  /api/v1/health:
    get:
      tags: [health]
      summary: 健康检查
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /api/v1/setup/status:
    get:
      tags: [setup]
      summary: 是否需首次引导
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  setup_required: { type: boolean }
                  setup_complete: { type: boolean }

  /api/v1/setup/interfaces:
    get:
      tags: [setup]
      summary: 引导用网卡列表
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  interfaces:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        up: { type: boolean }
                        addrs: { type: array, items: { type: string } }

  /api/v1/setup/complete:
    post:
      tags: [setup]
      summary: 完成初始设置（管理员、LAN/WAN、可选 SNAT IP）
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [admin_user, admin_pass, dev_lan, dev_wan]
              properties:
                admin_user: { type: string }
                admin_pass: { type: string }
                dev_lan: { type: string }
                dev_wan: { type: string }
                policy_routes: { type: array, items: { type: string } }
                shared_ips: { type: array, items: { type: string } }
                hostname: { type: string }
                enable_dhcp: { type: boolean }
                apply_dataplane: { type: boolean }
      responses:
        '200':
          description: OK（Set-Cookie 登录）

  /api/v1/login:
    post:
      tags: [auth]
      summary: 登录（Set-Cookie qosnat_sess）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user, pass]
              properties:
                user: { type: string }
                pass: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/session:
    get:
      tags: [auth]
      summary: 当前会话
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  user: { type: string }

  /api/v1/logout:
    post:
      tags: [auth]
      summary: 登出
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/api-keys:
    get:
      tags: [auth]
      summary: 列出 API Key（实验性，不含完整 secret）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    role: { type: string, enum: [admin, readonly, firewall] }
                    key_prefix: { type: string }
                    created_at: { type: string }
    post:
      tags: [auth]
      summary: 创建 API Key（仅创建响应返回完整 key）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                role:
                  type: string
                  enum: [admin, readonly, firewall]
                  default: admin
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  name: { type: string }
