      tags: [nat]
      summary: 删除虚拟服务（query id）
      responses:
        '200':
          description: ok

  /api/v1/routes:
    get:
      tags: [network]
      summary: 托管路由 + 内核 main 表快照
      responses:
        '200':
          description: managed + live + dev_lan/dev_wan
    post:
      tags: [network]
      summary: 添加托管静态路由并 ip route replace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteEntry'
      responses:
        '200':
          description: 创建的条目

  /api/v1/routes/apply:
    post:
      tags: [network]
