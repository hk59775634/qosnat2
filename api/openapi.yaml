      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [vpn]
      summary: Peer 列表
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WGPeer'
    post:
      tags: [vpn]
      summary: 添加/更新 Peer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WGPeer'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 Peer
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/wireguard/instances/{id}/peers/traffic:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [vpn]
      summary: WireGuard Peer 流量统计与历史曲线
      description: |
        后台每 5 分钟从 `wg show IFACE dump` 采样 transfer 计数；`period` 控制历史曲线范围。
        `summary` 含累计/今日/周期字节；`series` 为 Mbps 时间序列。`online`/`current` 来自当前内核状态。
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string, description: Peer 名称 }
        - name: period
          in: query
          schema: { type: string, enum: [24h, 7d, 30d, 365d], default: 7d }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  peer: { type: string }
                  online: { type: boolean }
                  current: { type: object, additionalProperties: true }
                  summary:
                    type: object
                    properties:
                      total_rx_bytes: { type: integer }
                      total_tx_bytes: { type: integer }
                      today_rx_bytes: { type: integer }
                      today_tx_bytes: { type: integer }
                      period_rx_bytes: { type: integer }
                      period_tx_bytes: { type: integer }
                  series:
                    type: array
                    items:
                      type: object
                      properties:
                        ts: { type: integer }
                        rx_mbps: { type: number }
                        tx_mbps: { type: number }
                  resolution: { type: string }
                  period: { type: string }
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /api/v1/vpn/wireguard/instances/{id}/peers/{name}/conf:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: name
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [vpn]
      summary: 下载客户端配置
      responses:
        '200':
          description: WireGuard client conf
          content:
            text/plain: {}

  /api/v1/vpn/ocserv:
    get:
      tags: [vpn]
      summary: ocserv（OpenConnect）配置与安装状态
      description: |
        返回脱敏后的 `config`（不含用户密码、RADIUS/伪装密钥、vhost 用户密码）、`vhosts_meta`（含是否可管理独立用户等元数据）、
        `status`（二进制/服务是否已安装）、`install_job`（与 install/status 相同结构）。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    $ref: '#/components/schemas/OCServConfig'
                  vhosts_meta:
                    type: array
                    description: 各 vhost 公开元数据（不含密钥）
                    items: { type: object }
                  status:
                    type: object
                    description: 安装检测结果（如 ocserv 是否在 PATH、unit 是否存在）
                  install_script: { type: string }
                  install_job:
                    $ref: '#/components/schemas/OCServInstallJobStatus'
                  conf_path: { type: string, example: /etc/ocserv/ocserv.conf }
                  radius_secret_set: { type: boolean }
                  camouflage_secret_set: { type: boolean }
                  admin_user:
                    type: string
                    description: Web 管理员用户名（用于卸载确认等提示，不含密码）
                  restart_pending_reasons:
                    type: array
                    description: |
                      相对 ocserv(8) 中不可随 reload 生效的配置项，若服务在保存后仍在运行且尚未重启，
                      则返回稳定 code 列表（如 `listen_ports`、`auth_global`、`vhost:example.com`）；执行 `POST .../service` restart 后清空。
                    items: { type: string }
                  root_for_service_ops:
                    type: boolean
                    description: 为 true 时 Web 可对 ocserv 执行 systemctl 启停/重启（qosnatd 以 root 运行）
    put:
      tags: [vpn]
      summary: 保存 ocserv 配置
      description: |
        写入 state 并同步 ocpasswd、组配置、radcli。用户密码、全局 RADIUS secret、伪装密钥留空表示保留原值。
        不自动 systemctl 重启，需再调用 `POST .../apply`。
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/ocserv/apply:
    post:
      tags: [vpn]
      summary: 写入 ocserv.conf 并 reload / start / stop ocserv
      description: |
        根据 `enabled` 写配置并同步 ocpasswd、radcli 等。服务已在运行时**仅**执行 `systemctl reload`（及 occtl reload 回退），
        不再自动 `restart`（与 ocserv 手册一致：部分指令 reload 不生效，须用户手动重启）。
        未运行时执行 `systemctl start`；关闭时 `stop`+`disable`。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  apply_mode:
                    type: string
                    description: reload（运行中热加载）| start（冷启动）| stop
                  restart_pending_reasons:
                    type: array
                    description: 与 GET `restart_pending_reasons` 相同；若保存后仍有需重启才生效的项则非空
                    items: { type: string }
        '500':
          description: reload 失败等

  /api/v1/vpn/ocserv/service:
    post:
      tags: [vpn]
      summary: systemctl 启动/停止/重启 ocserv（需 root）
      description: |
        对 `ocserv` 执行 `start`、`stop` 或 `restart`。用于 Web 便捷控制；成功后清除 `restart_pending_reasons`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [start, stop, restart]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  action: { type: string }
        '400':
          description: JSON 无效或 action 非法
        '403':
          description: 非 root 运行 qosnatd

  /api/v1/vpn/ocserv/install:
    post:
      tags: [vpn]
      summary: 后台源码编译安装 ocserv（需 root 运行 qosnatd）
      description: |
        单实例任务；若已在安装中返回 409。从 GitLab 官方源码编译安装（默认 tag 1.4.2，可在 body 指定 version）。
        完成后用 `GET .../install/status` 或 GET 主接口的 `install_job` 查看日志尾部。
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServInstallPut'
      responses:
        '202':
          description: 安装已在后台启动
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  message: { type: string }
                  script: { type: string }
        '403':
          description: 非 root

  /api/v1/vpn/ocserv/uninstall:
    post:
      tags: [vpn]
      summary: 卸载 ocserv（需 root 与管理员密码）
      description: |
        校验 Web 管理员密码后：停止并禁用 `ocserv` systemd 服务、删除 unit 与 `/usr/local` 下 ocserv/occtl/ocpasswd。
        需 qosnatd 以 root 运行；非 root 返回 403。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [admin_password]
              properties:
                admin_password:
                  type: string
                  description: Web 管理员登录密码（与登录页相同）
      responses:
        '200':
          description: 卸载完成
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '400':
          description: JSON 无效
        '403':
          description: 密码错误或非 root 运行 qosnatd
        '500':
          description: 卸载过程失败

  /api/v1/vpn/ocserv/install/status:
    get:
      tags: [vpn]
      summary: ocserv 安装任务状态（与 Web「概览」轮询一致）
      description: 返回 `OCServInstallJobStatus`；`state=running` 时 `log_tail` 为安装日志末尾。
      responses:
        '200':
          description: 当前安装进度或 idle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OCServInstallJobStatus'

  /api/v1/vpn/ocserv/status/detail:
    get:
      tags: [vpn]
      summary: ocserv 运行统计（occtl show status -j）
      description: 需 `advanced.use_occtl=true` 且 occtl 可用；否则 503。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: object }
                  detail: { type: object }
                  use_occtl: { type: boolean }
                  socket_file: { type: string }
        '503':
          description: occtl 不可用或未启用

  /api/v1/vpn/ocserv/sessions:
    get:
      tags: [vpn]
      summary: 在线会话（occtl show users -j）
      description: 返回 `sessions` 数组；字段随 ocserv 版本略有差异。occtl 不可用时 503。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items: { type: object }
                  use_occtl: { type: boolean }
                  socket_file: { type: string }
        '503':
          description: occtl 不可用或未启用

  /api/v1/vpn/ocserv/sessions/disconnect:
    post:
      tags: [vpn]
      summary: 断开在线会话（occtl disconnect id；用户名可能为空或重复）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: string, description: occtl 会话 ID（唯一） }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '400':
          description: 参数错误或断开失败

  /api/v1/vpn/ocserv/groups:
    get:
      tags: [vpn]
      summary: ocserv 组列表与全局组路径
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/OCServGroup'
                  config_per_group: { type: string }
                  default_group_config: { type: string }
                  auto_select_group: { type: boolean }
    post:
      tags: [vpn]
      summary: 添加 ocserv 组（plain 认证）
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServGroup'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    put:
      tags: [vpn]
      summary: 更新 ocserv 组
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServGroup'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 ocserv 组
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/ocserv/vhosts:
    get:
      tags: [vpn]
      summary: ocserv 虚拟主机列表
      description: 返回脱敏 vhost（不含 radius.secret、camouflage_secret、用户密码）。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  vhosts:
                    type: array
                    items:
                      $ref: '#/components/schemas/OCServVhost'
    post:
      tags: [vpn]
      summary: 添加 vhost
      description: |
        合并写入 state；新建可从全局配置种子化（`VhostFromGlobal`）。
        若指定 `plain_passwd_path` 且 `users` 非空，会同步到该密码文件。
        需 `POST .../apply` 后 ocserv 才加载新 `[vhost:domain]`。
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServVhost'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    put:
      tags: [vpn]
      summary: 更新 vhost
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServVhost'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 vhost
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/ocserv/vhosts/users:
    get:
      tags: [vpn]
      summary: vhost 独立密码文件用户列表
      description: |
        查询参数 `domain` 必填。仅当该 vhost 为 plain 认证且 `plain_passwd_path` 非空时可用（与 Web vhost「用户」Tab 一致）。
        否则 400。
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                  passwd_path: { type: string }
        '400':
          description: 未配置独立密码文件或非 plain
        '404':
          description: vhost 不存在
    post:
      tags: [vpn]
      summary: 添加或覆盖 vhost 本地用户（同步 ocpasswd 至该 vhost 密码文件）
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
                comment: { type: string }
                group: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    put:
      tags: [vpn]
      summary: 更新 vhost 本地用户
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string }
                password: { type: string }
                comment: { type: string }
                group: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 vhost 本地用户
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
        - name: username
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/ocserv/users/traffic:
    get:
      tags: [vpn]
      summary: ocserv 用户流量统计与历史曲线
      description: |
        后台每 5 分钟采样在线用户流量；`period` 控制历史曲线范围。
        `summary` 含累计/今日/周期字节；`series` 为 Mbps 时间序列（与仪表盘图表一致）。
      parameters:
        - name: username
          in: query
          required: true
          schema: { type: string }
        - name: period
          in: query
          schema: { type: string, enum: [24h, 7d, 30d, 365d], default: 7d }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  username: { type: string }
                  online: { type: boolean }
                  summary:
                    type: object
                    properties:
                      total_rx_bytes: { type: integer }
                      total_tx_bytes: { type: integer }
                      today_rx_bytes: { type: integer }
                      today_tx_bytes: { type: integer }
                      period_rx_bytes: { type: integer }
                      period_tx_bytes: { type: integer }
                  series:
                    type: array
                    items:
                      type: object
                      properties:
                        ts: { type: integer }
                        rx_mbps: { type: number }
                        tx_mbps: { type: number }
                  resolution: { type: string }
                  period: { type: string }

  /api/v1/vpn/ocserv/users:
    get:
      tags: [vpn]
      summary: ocserv 用户列表（不含密码）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/OCServUser'
    post:
      tags: [vpn]
      summary: 添加或更新 ocserv 用户
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
                group: { type: string }
                comment: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    put:
      tags: [vpn]
      summary: 修改 ocserv 用户（密码留空则不修改）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string }
                password: { type: string }
                group: { type: string }
                comment: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 ocserv 用户
      parameters:
        - name: username
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/diagnostics/captures:
    get:
      tags: [diagnostics]
      summary: 抓包会话列表
    post:
      tags: [diagnostics]
      summary: 启动 tcpdump
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                device: { type: string }
                filter: { type: string }
                duration_sec: { type: integer }
    delete:
      tags: [diagnostics]
      summary: 停止并删除抓包会话
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }

  /api/v1/diagnostics/captures/{id}/download:
    get:
      tags: [diagnostics]
      summary: 下载 pcap
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/vnd.tcpdump.pcap: {}

  /api/v1/diagnostics/conntrack:
    get:
      tags: [diagnostics]
      summary: conntrack 连接列表
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 200, maximum: 2000 }
        - name: filter
          in: query
          description: 匹配 src/dst 子串
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConntrackList'
        '503':
          description: conntrack-tools 未安装或执行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/diagnostics/terminal:
    get:
      tags: [diagnostics]
      summary: Web 终端 WebSocket 升级端点
      description: |
        使用 WebSocket 连接；须已登录管理会话。
        可选环境变量 `QOSNAT_TERMINAL_ALLOW_CIDRS` 限制客户端来源 IP。
        非 WebSocket GET 返回 400。
      responses:
        '101':
          description: Switching Protocols（WebSocket）
        '403':
          description: 终端未启用
        '400':
          description: 非 WebSocket 请求
