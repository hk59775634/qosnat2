      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Ok'
                  - $ref: '#/components/schemas/ShaperTC'

  /api/v1/vpn/wireguard:
    get:
      tags: [vpn]
