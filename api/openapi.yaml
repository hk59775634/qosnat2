openapi: 3.0.3
info:
  title: qosnat2 API
  description: |
    单机双网卡 QoS（HTB + eBPF + IFB）+ NAT（nftables）+ VPN（WireGuard / ocserv）控制面 REST API。

    **鉴权**：除 `GET /api/v1/health`、`GET /openapi.yaml`、`/api/v1/setup/*` 与 `POST /api/v1/login` 外，需 Session Cookie `qosnat_sess` 或请求头 `X-API-Key`（实验性，见 `/api/v1/api-keys`）。

    **交互文档**：Web UI → 开发 → API (Scalar)，或 `GET /openapi.yaml`。中文说明索引见仓库 `docs/API-ZH.md`。

    **功能域（tags）**：
    - `health` / `setup` / `auth`：健康检查、首次引导、登录与会话
    - `network`：网卡、VLAN/VXLAN、多 WAN、netplan 预览与应用
    - `nat`：SNAT/DNAT、防火墙规则与别名对象组
    - `shaper`：QoS 模板、租户、HTB 叶子队列
    - `stats` / `ebpf` / `system`：仪表盘、BPF、sysctl/HTTPS/审计
    - `vpn`：WireGuard、ocserv（OpenConnect）含虚拟主机与独立用户
    - `diagnostics`：tcpdump 抓包、conntrack 列表

    **ocserv 常用流程**：
    1. `GET /api/v1/vpn/ocserv` 读取配置与 `install_job` / `status`
    2. `PUT` 保存 state（密码/RADIUS 密钥留空表示不修改）
    3. `POST /api/v1/vpn/ocserv/apply` 写入 `ocserv.conf` 并 `systemctl` 启停
    4. 虚拟主机：`/api/v1/vpn/ocserv/vhosts`；独立密码文件用户：`/api/v1/vpn/ocserv/vhosts/users?domain=`
    5. 安装：`POST .../install`（202，需 root）→ 轮询 `GET .../install/status`

    **带宽字段（ocserv）**：`rx-data-per-sec` / `tx-data-per-sec` 为**服务端视角**（限制客户端上行用 `tx-data-per-sec`）。Web UI 已按「客户端上/下行」展示并映射到上述字段。
  version: 1.0.0
  contact:
    name: qosnat2

servers:
  - url: /
    description: 当前 qosnatd 实例

tags:
  - name: health
    description: 健康检查与 OpenAPI 规范下载
  - name: auth
    description: 登录、会话、API Key（实验性）
  - name: setup
    description: 首次引导（无需登录）
  - name: network
    description: 网卡、角色、VLAN/VXLAN、多 WAN、netplan
  - name: nat
    description: SNAT/DNAT 策略、防火墙 filter 规则与别名
  - name: shaper
    description: QoS 模板、租户、活动主机、TC 叶子队列
  - name: stats
    description: 仪表盘聚合指标
  - name: ebpf
    description: BPF Map/程序状态与重载
  - name: system
    description: sysctl 调优、常规设置、HTTPS/ACME、审计、RSS 队列
  - name: vpn
    description: WireGuard 与 ocserv（OpenConnect），含 vhost 与流量统计
  - name: diagnostics
    description: 抓包与 conntrack 诊断

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: qosnat_sess
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Ok:
      type: object
      properties:
        ok:
          type: boolean
    Error:
      type: object
      properties:
        error:
          type: string
    RateLimit:
      type: object
      properties:
        down:
          type: string
          example: 8mbit
        up:
          type: string
          example: 8mbit
    HostRate:
      allOf:
        - $ref: '#/components/schemas/RateLimit'
    DHCPState:
      type: object
      properties:
        enabled: { type: boolean }
        interface: { type: string, description: 绑定网卡，默认 DEV_LAN }
        range_start: { type: string }
        range_end: { type: string }
        router: { type: string }
        netmask: { type: string }
        domain: { type: string }
        dns_servers: { type: array, items: { type: string } }
        lease_time_sec: { type: integer }
        authoritative: { type: boolean }
        static_leases:
          type: array
          items:
            type: object
            properties:
              mac: { type: string }
              ip: { type: string }
              hostname: { type: string }
              comment: { type: string }
    RouteEntry:
      type: object
      properties:
        id: { type: string }
        dest: { type: string, example: "10.0.0.0/8" }
        gateway: { type: string }
        device: { type: string }
        table: { type: integer }
        metric: { type: integer }
        comment: { type: string }
        enabled: { type: boolean }
    WanPortForward:
      type: object
      properties:
        id: { type: string }
        interface: { type: string, description: 入接口，默认 DEV_WAN }
        ip_version: { type: string, enum: [ipv4, ipv6] }
        proto: { type: string, enum: [tcp, udp, tcp_udp] }
        src_addr: { type: string, example: "0.0.0.0/0" }
        dst_addr: { type: string, description: 目标地址，空为任意 }
        dst_port: { type: integer }
        redirect_ip: { type: string }
        redirect_port: { type: integer }
        comment: { type: string }
    Health:
      type: object
      properties:
        ok: { type: boolean }
        service: { type: string }
        phase: { type: string }
        dev_lan: { type: string }
        dev_wan: { type: string }
        bpf: { type: boolean }
        tc_attach: { type: boolean }
        setup_complete: { type: boolean }
        setup_required: { type: boolean }
        tls_enabled: { type: boolean }
        tls_active: { type: boolean }
        suggest_https: { type: boolean, description: 已配置 HTTPS 但进程仍监听 HTTP，需重启 qosnatd }
        admin_port: { type: string }
    TLSStatus:
      type: object
      properties:
        tls_enabled: { type: boolean }
        tls_active: { type: boolean }
        cert_path: { type: string }
        key_path: { type: string }
        has_cert_file: { type: boolean }
        has_key_file: { type: boolean }
        cert_subject: { type: string }
        cert_not_after: { type: string, format: date-time }
        acme_enabled: { type: boolean }
        domain: { type: string }
        acme_email: { type: string }
        acme_staging: { type: boolean }
        acme_renew_days: { type: integer }
        acme_last_ok: { type: string }
        acme_last_error: { type: string }
    GeneralSettings:
      type: object
      properties:
        hostname: { type: string }
        admin_user: { type: string }
        dev_lan: { type: string }
        dev_wan: { type: string }
        setup_complete: { type: boolean }
        tls:
          $ref: '#/components/schemas/TLSStatus'
    GeneralSettingsPut:
      type: object
      properties:
        hostname: { type: string }
        new_password: { type: string, minLength: 8 }
        current_password: { type: string }
        tls_enabled: { type: boolean }
        tls_cert: { type: string, description: PEM 证书 }
        tls_key: { type: string, description: PEM 私钥 }
        tls_domain: { type: string }
        tls_acme_enabled: { type: boolean }
        tls_acme_email: { type: string }
        tls_acme_staging: { type: boolean }
        tls_acme_renew_days: { type: integer }
    IfaceAddr:
      type: object
      properties:
        family: { type: string }
        cidr: { type: string }
        scope: { type: string }
    IfaceTraffic:
      type: object
      properties:
        rx_mbps: { type: number }
        tx_mbps: { type: number }
    IfaceListItem:
      type: object
      properties:
        name: { type: string }
        up: { type: boolean }
        operstate: { type: string }
        mac: { type: string }
        addrs: { type: array, items: { $ref: '#/components/schemas/IfaceAddr' } }
        link_speed_mbps: { type: integer, description: 协商线速 Mbps，0=未知 }
        role: { type: string, enum: [LAN, WAN] }
        traffic: { $ref: '#/components/schemas/IfaceTraffic' }
        rss_channels: { type: integer }
    TrafficPoint:
      type: object
      properties:
        ts: { type: integer, format: int64 }
        lan_rx_mbps: { type: number }
        lan_tx_mbps: { type: number }
        wan_rx_mbps: { type: number }
        wan_tx_mbps: { type: number }
        cpu_percent: { type: number }
        conntrack: { type: integer }
    EthtoolRing:
      type: object
      properties:
        rx_max: { type: integer }
        rx_current: { type: integer }
        tx_max: { type: integer }
        tx_current: { type: integer }
    EthtoolOffloads:
      type: object
      properties:
        gro: { type: string }
        gso: { type: string }
        tx_checksum: { type: string }
        rx_checksum: { type: string }
    EthtoolInfo:
      type: object
      properties:
        device: { type: string }
        ring: { $ref: '#/components/schemas/EthtoolRing' }
        offloads: { $ref: '#/components/schemas/EthtoolOffloads' }
    EthtoolPut:
      type: object
      properties:
        rx_ring: { type: integer }
        tx_ring: { type: integer }
        offloads: { $ref: '#/components/schemas/EthtoolOffloads' }
    VLANIface:
      type: object
      properties:
        id: { type: string }
        parent: { type: string }
        vid: { type: integer, minimum: 1 }
        name: { type: string }
        ipv4: { type: array, items: { type: string } }
        up: { type: boolean }
    TenantEntry:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        cidrs: { type: array, items: { type: string } }
        down: { type: string, example: 50mbit }
        up: { type: string, example: 50mbit }
        device: { type: string }
    VXLANTunnel:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        vni: { type: integer }
        local: { type: string }
        remote: { type: string }
        port: { type: integer, default: 4789 }
        underlay: { type: string }
        ipv4: { type: array, items: { type: string } }
        up: { type: boolean }
    WanLink:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        device: { type: string }
        gateway: { type: string }
        metric: { type: integer }
        tier: { type: integer }
        weight: { type: integer, description: 占位，尚未参与选路 }
        enabled: { type: boolean }
    ShaperTC:
      type: object
      properties:
        leaf: { type: string, enum: [fq_codel, cake, fq] }
        fq_flows: { type: integer }
        fq_quantum: { type: integer }
    ShaperTCPut:
      type: object
      properties:
        leaf: { type: string, enum: [fq_codel, cake, fq] }
        fq_flows: { type: integer }
        fq_quantum: { type: integer }
        apply: { type: boolean, description: true 时重建 TC 数据面 }
    WGPeer:
      type: object
      required: [name, public_key]
      properties:
        name: { type: string }
        public_key: { type: string }
        private_key: { type: string, description: 客户端私钥，导出 conf 用 }
        allowed_ips:
          type: array
          items: { type: string }
        endpoint: { type: string }
        persistent_keepalive: { type: integer }
        preshared_key: { type: string }
        rate:
          $ref: '#/components/schemas/HostRate'
    WireGuardConfig:
      type: object
      properties:
        enabled: { type: boolean }
        interface: { type: string, example: wg0 }
        listen_port: { type: integer }
        address: { type: string }
        private_key: { type: string }
        public_key: { type: string }
        dns:
          type: array
          items: { type: string }
        server_endpoint: { type: string }
        peers:
          type: array
          items:
            $ref: '#/components/schemas/WGPeer'
    OCServUser:
      type: object
      properties:
        username: { type: string }
        password: { type: string, description: 仅 POST 创建/改密；GET 不返回 }
        group: { type: string }
        comment: { type: string }
    OCServGroup:
      type: object
      required: [name]
      properties:
        name: { type: string }
        label: { type: string, description: select-group 展示名 }
        comment: { type: string }
        dns:
          type: array
          items: { type: string }
        routes:
          type: array
          items: { type: string }
        no_routes:
          type: array
          items: { type: string }
        ipv4_network: { type: string }
        ipv4_netmask: { type: string }
        rx_data_per_sec: { type: integer, description: 服务端下行限速（字节/秒，0=不限） }
        tx_data_per_sec: { type: integer, description: 服务端上行限速（限制客户端上传） }
        mtu: { type: integer }
        tunnel_all_dns: { type: boolean }
    OCServInstallJobStatus:
      type: object
      description: ocserv 源码安装后台任务（GET install/status 与 GET ocserv 内 install_job）
      properties:
        state:
          type: string
          enum: [idle, running, ok, failed]
          description: idle=无任务；running=安装中；ok/failed=已结束
        message: { type: string, description: 人类可读状态说明 }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        log_tail: { type: string, description: 安装日志末尾约 80 行 }
        script: { type: string, description: 执行的 bash 安装脚本路径 }
    OCServVhost:
      type: object
      description: |
        ocserv 虚拟主机 `[vhost:domain]`。新建时服务端可用全局配置种子化默认值（`VhostFromGlobal`）。
        认证：`auth_method` 空=继承全局；`plain` 可设 `plain_passwd_path` 独立 ocpasswd；`radius` 且 `radius.server` 非空则写 `/etc/radcli/vhosts/<domain>.conf`。
      required: [domain]
      properties:
        enabled: { type: boolean, description: 是否启用该 vhost }
        domain: { type: string, description: 客户端连接域名（SNI/Host） }
        comment: { type: string }
        auth_method:
          type: string
          enum: ['', plain, radius, certificate]
          description: 空=继承全局 auth_method
        plain_passwd_path:
          type: string
          description: plain 专用密码文件；空则使用全局 ocpasswd。非空时可用 vhosts/users API 管理用户
        users:
          type: array
          description: 仅 plain_passwd_path 非空时写入该文件；GET 列表不返回密码
          items:
            $ref: '#/components/schemas/OCServUser'
        radius:
          $ref: '#/components/schemas/OCServRadius'
        server_cert_path: { type: string }
        server_key_path: { type: string }
        ca_cert_path: { type: string }
        crl_path: { type: string }
        dh_params_path: { type: string }
        tls_priorities: { type: string }
        cert_user_oid: { type: string }
        cert_group_oid: { type: string }
        ipv4_network: { type: string }
        ipv4_netmask: { type: string }
        ipv6_network: { type: string }
        ipv6_prefix: { type: integer }
        dns:
          type: array
          items: { type: string }
        nbns:
          type: array
          items: { type: string }
        default_domain: { type: string }
        tunnel_all_dns: { type: boolean }
        mtu: { type: integer }
        routes:
          type: array
          items: { type: string }
        no_routes:
          type: array
          items: { type: string }
        iroutes:
          type: array
          items: { type: string }
        expose_iroutes: { type: boolean }
        rx_data_per_sec: { type: integer, description: 服务端下行限速（字节/秒） }
        tx_data_per_sec: { type: integer, description: 服务端上行限速（限制客户端上传） }
        pkt_mtu_size: { type: integer }
        idle_timeout: { type: integer }
        session_timeout: { type: integer }
        mobile_idle_timeout: { type: integer }
        max_same_clients: { type: integer }
        keepalive: { type: integer }
        dpd: { type: integer }
        mobile_dpd: { type: integer }
        cookie_timeout: { type: integer }
        deny_roaming: { type: boolean }
        persistent_cookies: { type: boolean }
        rekey_time: { type: integer }
        rekey_method: { type: string }
        compression: { type: boolean }
        predictable_ips: { type: boolean }
        dtls_legacy: { type: boolean }
        cisco_client_compat: { type: boolean }
        cisco_svc_client_compat: { type: boolean }
        no_udp: { type: boolean }
        banner: { type: string }
        pre_login_banner: { type: string }
        camouflage: { type: boolean }
        camouflage_secret: { type: string, description: GET 不返回；PUT 留空不修改 }
        camouflage_realm: { type: string }
        config_per_user: { type: string }
        config_per_group: { type: string }
        default_user_config: { type: string }
        default_group_config: { type: string }
        select_groups:
          type: array
          items: { type: string }
        auto_select_group: { type: boolean }
        default_select_group: { type: string }
        connect_script: { type: string }
        disconnect_script: { type: string }
        acct_enabled: { type: boolean, description: 空/false 可继承全局 RADIUS 计费 }
        stats_report_time: { type: integer }
    OCServRadius:
      type: object
      properties:
        server: { type: string, description: RADIUS 服务器地址 }
        auth_port: { type: integer, example: 1812 }
        acct_port: { type: integer, example: 1813 }
        secret: { type: string, description: 共享密钥；GET 不返回 }
        groupconfig: { type: boolean, description: 从 RADIUS 读取用户/组配置 }
        nas_identifier: { type: string }
        acct_enabled: { type: boolean }
        stats_report_time: { type: integer, example: 360 }
        config_path: { type: string }
    OCServAdvanced:
      type: object
      description: ocserv 功能开关与高级参数
      properties:
        try_mtu_discovery: { type: boolean }
        isolate_workers: { type: boolean }
        dtls_legacy: { type: boolean }
        tcp: { type: boolean }
        udp: { type: boolean }
        deny_roaming: { type: boolean }
        cisco_client_compat: { type: boolean }
        compression: { type: boolean }
        keepalive: { type: boolean }
        dpd: { type: boolean }
        mobile_dpd: { type: boolean }
        predictable_ips: { type: boolean }
        ping_leases: { type: boolean }
        use_occtl: { type: boolean }
        rekey: { type: boolean }
        switch_to_tcp: { type: boolean }
        camouflage: { type: boolean }
        cisco_svc_client_compat: { type: boolean }
        client_bypass_protocol: { type: boolean }
        max_same_clients: { type: integer }
        rekey_method: { type: string, enum: [ssl, new-tunnel] }
        rate_limit_ms: { type: integer }
        log_level: { type: integer }
        max_ban_score: { type: integer }
        ban_time: { type: integer }
        ban_reset_time: { type: integer }
        server_stats_reset_time: { type: integer }
        rx_data_per_sec: { type: integer, description: 全局默认：服务端下行限速（字节/秒） }
        tx_data_per_sec: { type: integer, description: 全局默认：服务端上行限速（限制客户端上传） }
        camouflage_realm: { type: string }
        default_domain: { type: string }
        config_per_group: { type: string }
        cert_user_oid: { type: string }
        tls_priorities: { type: string }
        keepalive_sec: { type: integer }
        dpd_sec: { type: integer }
        mobile_dpd_sec: { type: integer }
        cookie_timeout: { type: integer }
        rekey_time: { type: integer }
        auth_timeout: { type: integer }
        switch_to_tcp_timeout: { type: integer }
    OCServConfig:
      type: object
      properties:
        enabled: { type: boolean }
        auth_method: { type: string, enum: [plain, radius] }
        radius:
          $ref: '#/components/schemas/OCServRadius'
        advanced:
          $ref: '#/components/schemas/OCServAdvanced'
        tcp_port: { type: integer, example: 443 }
        udp_port: { type: integer }
        device: { type: string, example: vpns }
        ipv4_network: { type: string, example: 10.250.0.0 }
        ipv4_netmask: { type: string, example: 255.255.255.0 }
        dns:
          type: array
          items: { type: string }
        routes:
          type: array
          items: { type: string }
        no_routes:
          type: array
          items: { type: string }
        server_cert_path: { type: string }
        server_key_path: { type: string }
        ca_cert_path: { type: string }
        socket_file: { type: string }
        max_clients: { type: integer }
        use_qosnat_tls: { type: boolean, description: 使用 /etc/qosnat2/tls.* 作为服务端证书 }
        server_cert: { type: string }
        server_key: { type: string }
        users:
          type: array
          items:
            $ref: '#/components/schemas/OCServUser'
        config_per_group: { type: string, example: /etc/ocserv/config-per-group/ }
        default_group_config: { type: string, example: /etc/ocserv/defaults/group.conf }
        auto_select_group: { type: boolean }
        groups:
          type: array
          items:
            $ref: '#/components/schemas/OCServGroup'
        vhosts:
          type: array
          items:
            $ref: '#/components/schemas/OCServVhost'
    ConntrackEntry:
      type: object
      properties:
        l3_proto: { type: string }
        protocol: { type: string }
        timeout_sec: { type: integer }
        state: { type: string }
        src: { type: string }
        dst: { type: string }
        sport: { type: integer }
        dport: { type: integer }
        reply_src: { type: string }
        reply_dst: { type: string }
        reply_sport: { type: integer }
        reply_dport: { type: integer }
        mark: { type: integer }
        flags: { type: string }
    ConntrackList:
      type: object
      properties:
        count: { type: integer, description: nf_conntrack_count }
        limit: { type: integer }
        truncated: { type: boolean }
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ConntrackEntry'

security:
  - sessionAuth: []
  - apiKeyAuth: []

paths:
  /openapi.yaml:
    get:
      tags: [health]
      summary: OpenAPI 规范（YAML）
      security: []
      responses:
        '200':
          description: YAML
          content:
            application/yaml: {}

  /api/v1/health:
    get:
      tags: [health]
      summary: 健康检查
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /api/v1/setup/status:
    get:
      tags: [setup]
      summary: 是否需首次引导
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  setup_required: { type: boolean }
                  setup_complete: { type: boolean }

  /api/v1/setup/interfaces:
    get:
      tags: [setup]
      summary: 引导用网卡列表
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  interfaces:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        up: { type: boolean }
                        addrs: { type: array, items: { type: string } }

  /api/v1/setup/complete:
    post:
      tags: [setup]
      summary: 完成初始设置（管理员、LAN/WAN、可选 SNAT IP）
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [admin_user, admin_pass, dev_lan, dev_wan]
              properties:
                admin_user: { type: string }
                admin_pass: { type: string }
                dev_lan: { type: string }
                dev_wan: { type: string }
                policy_routes: { type: array, items: { type: string } }
                shared_ips: { type: array, items: { type: string } }
                hostname: { type: string }
                enable_dhcp: { type: boolean }
                apply_dataplane: { type: boolean }
      responses:
        '200':
          description: OK（Set-Cookie 登录）

  /api/v1/login:
    post:
      tags: [auth]
      summary: 登录（Set-Cookie qosnat_sess）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user, pass]
              properties:
                user: { type: string }
                pass: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/session:
    get:
      tags: [auth]
      summary: 当前会话
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  user: { type: string }

  /api/v1/logout:
    post:
      tags: [auth]
      summary: 登出
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/api-keys:
    get:
      tags: [auth]
      summary: 列出 API Key（实验性，不含完整 secret）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    key_prefix: { type: string }
                    created_at: { type: string }
    post:
      tags: [auth]
      summary: 创建 API Key（仅创建响应返回完整 key）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201':
          description: Created
    delete:
      tags: [auth]
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/dhcp:
    get:
      tags: [network]
      summary: DHCP 配置、dnsmasq 状态与网卡列表
      responses:
        '200':
          description: config + status + interfaces + dev_lan/dev_wan
    put:
      tags: [network]
      summary: 保存 DHCP 配置（不立即应用）
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DHCPState'
      responses:
        '200':
          description: OK

  /api/v1/dhcp/apply:
    post:
      tags: [network]
      summary: 生成 dnsmasq 配置并启动/停止服务
      responses:
        '200':
          description: ok + active

  /api/v1/routes:
    get:
      tags: [network]
      summary: 托管路由 + 内核 main 表快照
      responses:
        '200':
          description: managed + live + dev_lan/dev_wan
    post:
      tags: [network]
      summary: 添加托管静态路由并 ip route replace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteEntry'
      responses:
        '200':
          description: 创建的条目

  /api/v1/routes/apply:
    post:
      tags: [network]
      summary: 回放 state 中全部启用路由
      responses:
        '200':
          description: OK

  /api/v1/routes/{id}:
    put:
      tags: [network]
      summary: 更新托管路由
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteEntry'
    delete:
      tags: [network]
      summary: 删除托管路由
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /api/v1/nat/policy-routes:
    get:
      tags: [nat]
      summary: SNAT 策略网段列表
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
    post:
      tags: [nat]
      summary: 添加策略网段
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [cidr]
              properties:
                cidr: { type: string, example: 10.0.0.0/8 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [nat]
      summary: 删除策略网段
      parameters:
        - name: cidr
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/nat/shared-ips:
    get:
      tags: [nat]
      summary: 共享 SNAT 公网 IP 池（未配置时 ips 为 WAN 口 IPv4）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ips: { type: array, items: { type: string } }
                  configured: { type: array, items: { type: string } }
                  auto_from_wan: { type: boolean }
                  wan_device: { type: string }
    post:
      tags: [nat]
      summary: 添加共享 IP
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ip]
              properties:
                ip: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [nat]
      parameters:
        - name: ip
          in: query
          required: true
          schema: { type: string }

  /api/v1/nat/static-mappings:
    get:
      tags: [nat]
      summary: 1:1 静态映射 inner→outer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: string }
    post:
      tags: [nat]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inner: { type: string }
                outer: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [nat]
      parameters:
        - name: inner
          in: query
          required: true
          schema: { type: string }

  /api/v1/nat/prefix-mappings:
    get:
      tags: [nat]
      summary: 网段 prefix SNAT
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: string }
    post:
      tags: [nat]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inner: { type: string }
                outer: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [nat]
      parameters:
        - name: inner
          in: query
          required: true
          schema: { type: string }

  /api/v1/nat/wan-forwards:
    get:
      tags: [nat]
      summary: 端口转发列表 + 网卡/默认项
      responses:
        '200':
          description: forwards, interfaces, defaults, dev_lan/dev_wan
    post:
      tags: [nat]
      summary: 添加 DNAT 规则并 reload nft
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WanPortForward'
      responses:
        '200':
          description: 创建的规则
    delete:
      tags: [nat]
      summary: 按 id 删除规则
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /api/v1/shaper/wizard:
    post:
      tags: [shaper]
      summary: 添加/更新 QoS 模板（网段或 /32；同步 policy_routes）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cidr: { type: string }
                down: { type: string }
                up: { type: string }
                mask: { type: integer }
                device: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/shaper/profiles/order:
    put:
      tags: [shaper]
      summary: 拖动排序后按顺序重写 id（order 为 CIDR 数组，靠前 id 越小）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  profiles:
                    type: array
                    items:
                      type: object
                      properties:
                        cidr: { type: string }
                        id: { type: integer }
                        down: { type: string }
                        up: { type: string }
                        down_bps: { type: integer }
                        up_bps: { type: integer }

  /api/v1/shaper/profiles:
    get:
      tags: [shaper]
      summary: 网段模板列表与整形绑定信息
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      type: object
                      properties:
                        cidr: { type: string }
                        id: { type: integer, description: 越小优先级越高 }
                        device: { type: string }
                        down: { type: string }
                        up: { type: string }
                        down_bps: { type: integer }
                        up_bps: { type: integer }
                        tenant_id: { type: string, description: 由租户 QoS 展开时写入 }
                  bind_device: { type: string }
                  dev_lan: { type: string }
                  dev_wan: { type: string }
                  attached_devices: { type: array, items: { type: string } }
    delete:
      tags: [shaper]
      parameters:
        - name: cidr
          in: query
          required: true
          schema: { type: string }

  /api/v1/shaper/tenants:
    get:
      tags: [shaper]
      summary: 租户 QoS 列表（展开为多条 profile）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantEntry'
    post:
      tags: [shaper]
      summary: 创建租户并展开 profile + 刷新整形
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantEntry'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantEntry'
    put:
      tags: [shaper]
      summary: 更新租户（query id）
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantEntry'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantEntry'
    delete:
      tags: [shaper]
      summary: 删除租户及其关联 profile
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/shaper/active:
    get:
      tags: [shaper]
      summary: 遍历 eBPF active_host 表（活动主机限速状态）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    ip: { type: string }
                    down_bps: { type: integer }
                    up_bps: { type: integer }
                    bytes_down: { type: integer }
                    bytes_up: { type: integer }
                    class_minor: { type: integer }

  /api/v1/stats/dashboard:
    get:
      tags: [stats]
      summary: 仪表大厅聚合
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/ebpf/maps:
    get:
      tags: [ebpf]
      summary: BPF Map / attach 状态
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/ebpf/programs:
    get:
      tags: [ebpf]
      summary: TC 挂载的 pinned 程序
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/v1/ebpf/reload:
    post:
      tags: [ebpf]
      summary: 重载 BPF 对象并回放 state
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/system/tuning:
    get:
      tags: [system]
      summary: 系统优化（sysctl / txqueuelen / RPS）当前与生效值
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
    put:
      tags: [system]
      summary: 保存系统优化配置，可选立即应用
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sysctl:
                  type: object
                  additionalProperties: { type: string }
                perf_preset: { type: boolean }
                txqueuelen_lan: { type: integer }
                txqueuelen_wan: { type: integer }
                rps_lan: { type: boolean }
                rps_wan: { type: boolean }
                apply: { type: boolean, description: true 时立即 sysctl -p 并调网卡 }
                apply_recommended: { type: boolean, description: true 时按当前 CPU/内存重算推荐并写入 }
                app:
                  type: object
                  description: shaper.leaf、idle_timeout、txqueuelen、rps 等
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/system/general:
    get:
      tags: [system]
      summary: 常规设置（hostname、HTTPS 状态）
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralSettings'
    put:
      tags: [system]
      summary: 更新 hostname、密码或 HTTPS（改 HTTPS 需 current_password）
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneralSettingsPut'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  warning: { type: string, description: 如需手动 restart qosnatd }
                  tls:
                    $ref: '#/components/schemas/TLSStatus'
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/system/tls/acme:
    post:
      tags: [system]
      summary: ACME 申请或续期证书（HTTP-01，需 root）
      parameters:
        - name: action
          in: query
          schema: { type: string, enum: [obtain, renew] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [current_password]
              properties:
                current_password: { type: string }
                action: { type: string, enum: [obtain, renew] }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  message: { type: string }
                  tls:
                    $ref: '#/components/schemas/TLSStatus'

  /api/v1/system/audit:
    get:
      tags: [system]
      summary: 审计日志最近条目

  /api/v1/firewall/rules:
    get:
      tags: [nat]
      summary: 防火墙自定义规则列表
    post:
      tags: [nat]
      summary: 添加规则并 reload nft
    put:
      tags: [nat]
      summary: 更新规则（query id）
    delete:
      tags: [nat]
      summary: 删除规则（query id）

  /api/v1/firewall/rules/order:
    put:
      tags: [nat]
      summary: 调整防火墙规则顺序
      description: |
        请求体 `order` 为规则 `id` 数组，按新顺序排列；保存 state 后 reload nft。
        与 Web「防火墙规则」页拖动排序一致。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items: { type: string }
                  description: 规则 id 列表，须包含全部现有 id
      responses:
        '200':
          description: 排序成功，返回完整 rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  rules: { type: array, items: { type: object } }

  /api/v1/firewall/aliases:
    get:
      tags: [nat]
      summary: 防火墙别名（nft 对象组）列表
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  aliases: { type: array, items: { type: object } }
    post:
      tags: [nat]
      summary: 添加或覆盖别名集
      description: 同名则覆盖；保存后 reload nft。类型含 ipv4 网段集合或 asn 前缀集。
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                type: { type: string, enum: [ipv4, asn] }
                members: { type: array, items: { type: string } }
                asn: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  name: { type: string }
    delete:
      tags: [nat]
      summary: 删除别名（query name）
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/system/mark-policy:
    get:
      tags: [system]
      summary: nft mark 与 QoS 隔离审计
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/interfaces:
    get:
      tags: [network]
      summary: 网卡列表、link_speed_mbps（sysfs/ethtool）、traffic 与 traffic_history（约 4h）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  dev_lan: { type: string }
                  dev_wan: { type: string }
                  netplan_path: { type: string }
                  interfaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/IfaceListItem'
                  traffic_history:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrafficPoint'
    put:
      tags: [network]
      summary: 修改网卡 IPv4 与 up/down
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [device]
              properties:
                device:
                  type: string
                  description: Linux 网卡名（1–15 字符，字母数字与 `._-`，禁止 `/`）
                ipv4: { type: array, items: { type: string } }
                up: { type: boolean }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/interfaces/roles:
    put:
      tags: [network]
      summary: 设置 LAN/WAN 网卡角色
      description: |
        写入 `/etc/qosnat2/dev_roles` 并更新进程内 `dev_lan` / `dev_wan`。
        `apply` 默认为 true：同时 netplan apply 并回放 QoS/NFT 数据面。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dev_wan]
              properties:
                dev_lan: { type: string, description: 可为空（仅 WAN 场景） }
                dev_wan: { type: string }
                apply: { type: boolean, default: true }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '400':
          description: 网卡不存在或 LAN/WAN 相同

  /api/v1/interfaces/queues:
    get:
      tags: [system]
      summary: RSS / 多队列 / softirq
      parameters:
        - name: dev
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object

  /api/v1/interfaces/ethtool:
    get:
      tags: [network]
      summary: 读取 ethtool ring 与 offload
      parameters:
        - name: device
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EthtoolInfo'
    put:
      tags: [network]
      summary: 设置 ring 或 offload（ethtool -G / -K）
      parameters:
        - name: device
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EthtoolPut'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  ethtool:
                    $ref: '#/components/schemas/EthtoolInfo'

  /api/v1/network/vlans:
