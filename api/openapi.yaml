            schema:
              type: object
              required: [dynamic_routing]
              properties:
                dynamic_routing:
                  $ref: '#/components/schemas/DynamicRoutingState'
      responses:
        '200':
          description: ok

  /api/v1/frr/dynamic-routing/apply:
    post:
