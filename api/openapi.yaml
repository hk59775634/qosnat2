                      $ref: '#/components/schemas/WanLink'
                  dev_wan: { type: string }
    post:
      tags: [network]
      summary: 添加 WAN 链路并同步 default 路由
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WanLink'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WanLink'
    put:
      tags: [network]
      summary: 更新 WAN 链路（query id）
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WanLink'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [network]
      summary: 删除 WAN 链路
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/network/netplan:
    get:
      tags: [network]
      summary: 预览合并后的 netplan YAML
      description: |
        根据 state 中 VLAN/物理口配置渲染 `99-qosnat2.yaml` 内容（与 `50-cloud-init.yaml` 合并；同名 ethernets 以 qosnat2 为准）。
        仅预览，不执行 apply。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  path: { type: string, description: 写入路径 }
                  yaml: { type: string }
                  vlans: { type: integer }
                  ifaces: { type: integer }
                  note: { type: string }

  /api/v1/network/netplan/apply:
    post:
      tags: [network]
      summary: 应用 netplan（失败自动回滚）
      description: 备份当前 netplan 与 state，执行 `netplan apply`；失败则恢复备份与 state。
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '400':
          description: apply 失败（已回滚）

  /api/v1/shaper/tc:
    get:
      tags: [shaper]
      summary: HTB 叶子队列类型与 fq 参数
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShaperTC'
    put:
      tags: [shaper]
      summary: 更新叶子队列；apply=true 时重建 TC
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShaperTCPut'
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Ok'
                  - $ref: '#/components/schemas/ShaperTC'

  /api/v1/vpn/wireguard:
    get:
      tags: [vpn]
      summary: WireGuard 配置与状态
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    $ref: '#/components/schemas/WireGuardConfig'
                  status:
                    type: object
    put:
      tags: [vpn]
      summary: 保存 WireGuard 配置
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WireGuardConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/wireguard/keys:
    post:
      tags: [vpn]
      summary: 生成 WireGuard 密钥对
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  private_key: { type: string }
                  public_key: { type: string }

  /api/v1/vpn/wireguard/apply:
    post:
      tags: [vpn]
      summary: wg-quick up/down
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  up: { type: boolean }

  /api/v1/vpn/wireguard/peers:
    get:
      tags: [vpn]
      summary: Peer 列表
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WGPeer'
    post:
      tags: [vpn]
      summary: 添加/更新 Peer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WGPeer'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 Peer
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/wireguard/peers/{name}/conf:
    get:
      tags: [vpn]
      summary: 下载客户端配置
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: WireGuard client conf
          content:
            text/plain: {}

  /api/v1/vpn/ocserv:
    get:
      tags: [vpn]
      summary: ocserv（OpenConnect）配置与安装状态
      description: |
        返回脱敏后的 `config`（不含用户密码、RADIUS/伪装密钥、vhost 用户密码）、`vhosts_meta`（含是否可管理独立用户等元数据）、
        `status`（二进制/服务是否已安装）、`install_job`（与 install/status 相同结构）。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    $ref: '#/components/schemas/OCServConfig'
                  vhosts_meta:
                    type: array
                    description: 各 vhost 公开元数据（不含密钥）
                    items: { type: object }
                  status:
                    type: object
                    description: 安装检测结果（如 ocserv 是否在 PATH、unit 是否存在）
                  install_script: { type: string }
                  install_job:
                    $ref: '#/components/schemas/OCServInstallJobStatus'
                  conf_path: { type: string, example: /etc/ocserv/ocserv.conf }
                  radius_secret_set: { type: boolean }
                  camouflage_secret_set: { type: boolean }
    put:
      tags: [vpn]
      summary: 保存 ocserv 配置
      description: |
        写入 state 并同步 ocpasswd、组配置、radcli。用户密码、全局 RADIUS secret、伪装密钥留空表示保留原值。
        不自动 systemctl 重启，需再调用 `POST .../apply`。
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/ocserv/apply:
    post:
      tags: [vpn]
      summary: 写入 ocserv.conf、ocpasswd 并 systemctl start/stop ocserv
      description: 根据 `enabled` 生成配置并 `systemctl start` 或 `stop` ocserv；同步 vhost radcli 与密码文件。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  apply_mode: { type: string, description: 如 up / down }

  /api/v1/vpn/ocserv/install:
    post:
      tags: [vpn]
      summary: 后台执行源码安装脚本（需 root 运行 qosnatd）
      description: 单实例任务；若已在安装中返回 409。完成后用 `GET .../install/status` 或本接口 GET 的 `install_job` 查看日志尾部。
      responses:
        '202':
          description: 安装已在后台启动
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  message: { type: string }
                  script: { type: string }
        '403':
          description: 非 root

  /api/v1/vpn/ocserv/install/status:
    get:
      tags: [vpn]
      summary: ocserv 安装任务状态（与 Web「概览」轮询一致）
      description: 返回 `OCServInstallJobStatus`；`state=running` 时 `log_tail` 为安装日志末尾。
      responses:
        '200':
          description: 当前安装进度或 idle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OCServInstallJobStatus'

  /api/v1/vpn/ocserv/status/detail:
    get:
      tags: [vpn]
      summary: ocserv 运行统计（occtl show status -j）
      description: 需 `advanced.use_occtl=true` 且 occtl 可用；否则 503。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: object }
                  detail: { type: object }
                  use_occtl: { type: boolean }
                  socket_file: { type: string }
        '503':
          description: occtl 不可用或未启用

  /api/v1/vpn/ocserv/sessions:
    get:
      tags: [vpn]
      summary: 在线会话（occtl show users -j）
      description: 返回 `sessions` 数组；字段随 ocserv 版本略有差异。occtl 不可用时 503。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items: { type: object }
                  use_occtl: { type: boolean }
                  socket_file: { type: string }
        '503':
          description: occtl 不可用或未启用

  /api/v1/vpn/ocserv/sessions/disconnect:
    post:
      tags: [vpn]
      summary: 断开在线会话（occtl disconnect user|id）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                id: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '400':
          description: 参数错误或断开失败

  /api/v1/vpn/ocserv/groups:
    get:
      tags: [vpn]
      summary: ocserv 组列表与全局组路径
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/OCServGroup'
                  config_per_group: { type: string }
                  default_group_config: { type: string }
                  auto_select_group: { type: boolean }
    post:
      tags: [vpn]
      summary: 添加 ocserv 组（plain 认证）
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServGroup'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    put:
      tags: [vpn]
      summary: 更新 ocserv 组
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServGroup'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 ocserv 组
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/ocserv/vhosts:
    get:
      tags: [vpn]
      summary: ocserv 虚拟主机列表
      description: 返回脱敏 vhost（不含 radius.secret、camouflage_secret、用户密码）。
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  vhosts:
                    type: array
                    items:
                      $ref: '#/components/schemas/OCServVhost'
    post:
      tags: [vpn]
      summary: 添加 vhost
      description: |
        合并写入 state；新建可从全局配置种子化（`VhostFromGlobal`）。
        若指定 `plain_passwd_path` 且 `users` 非空，会同步到该密码文件。
        需 `POST .../apply` 后 ocserv 才加载新 `[vhost:domain]`。
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServVhost'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    put:
      tags: [vpn]
      summary: 更新 vhost
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCServVhost'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 vhost
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/ocserv/vhosts/users:
    get:
      tags: [vpn]
      summary: vhost 独立密码文件用户列表
      description: |
        查询参数 `domain` 必填。仅当该 vhost 为 plain 认证且 `plain_passwd_path` 非空时可用（与 Web vhost「用户」Tab 一致）。
        否则 400。
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                  passwd_path: { type: string }
        '400':
          description: 未配置独立密码文件或非 plain
        '404':
          description: vhost 不存在
    post:
      tags: [vpn]
      summary: 添加或覆盖 vhost 本地用户（同步 ocpasswd 至该 vhost 密码文件）
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
                comment: { type: string }
                group: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    put:
      tags: [vpn]
      summary: 更新 vhost 本地用户
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string }
                password: { type: string }
                comment: { type: string }
                group: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 vhost 本地用户
      parameters:
        - name: domain
          in: query
          required: true
          schema: { type: string }
        - name: username
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/vpn/ocserv/users/traffic:
    get:
      tags: [vpn]
      summary: ocserv 用户流量统计与历史曲线
      description: |
        后台每 5 分钟采样在线用户流量；`period` 控制历史曲线范围。
        `summary` 含累计/今日/周期字节；`series` 为 Mbps 时间序列（与仪表盘图表一致）。
      parameters:
        - name: username
          in: query
          required: true
          schema: { type: string }
        - name: period
          in: query
          schema: { type: string, enum: [24h, 7d, 30d, 365d], default: 7d }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  username: { type: string }
                  online: { type: boolean }
                  summary:
                    type: object
                    properties:
                      total_rx_bytes: { type: integer }
                      total_tx_bytes: { type: integer }
                      today_rx_bytes: { type: integer }
                      today_tx_bytes: { type: integer }
                      period_rx_bytes: { type: integer }
                      period_tx_bytes: { type: integer }
                  series:
                    type: array
                    items:
                      type: object
                      properties:
                        ts: { type: integer }
                        rx_mbps: { type: number }
                        tx_mbps: { type: number }
                  resolution: { type: string }
                  period: { type: string }

  /api/v1/vpn/ocserv/users:
    get:
      tags: [vpn]
      summary: ocserv 用户列表（不含密码）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/OCServUser'
    post:
      tags: [vpn]
      summary: 添加或更新 ocserv 用户
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
                group: { type: string }
                comment: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    put:
      tags: [vpn]
      summary: 修改 ocserv 用户（密码留空则不修改）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string }
                password: { type: string }
                group: { type: string }
                comment: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
    delete:
      tags: [vpn]
      summary: 删除 ocserv 用户
      parameters:
        - name: username
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'

  /api/v1/diagnostics/captures:
    get:
      tags: [diagnostics]
      summary: 抓包会话列表
    post:
      tags: [diagnostics]
      summary: 启动 tcpdump
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                device: { type: string }
                filter: { type: string }
                duration_sec: { type: integer }
    delete:
      tags: [diagnostics]
      summary: 停止并删除抓包会话
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }

  /api/v1/diagnostics/captures/{id}/download:
    get:
      tags: [diagnostics]
      summary: 下载 pcap
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/vnd.tcpdump.pcap: {}

  /api/v1/diagnostics/conntrack:
    get:
      tags: [diagnostics]
      summary: conntrack 连接列表
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 200, maximum: 2000 }
        - name: filter
          in: query
          description: 匹配 src/dst 子串
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConntrackList'
        '503':
          description: conntrack-tools 未安装或执行失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
