// qosnat2 生产网关：即使重新启用 unattended-upgrades，也禁止升级网络/数据面关键包。
// 通配符语法见 apt.conf(5) Unattended-Upgrade::Package-Blacklist
Unattended-Upgrade::Package-Blacklist {
    "systemd";
    "systemd-sysv";
    "systemd-timesyncd";
    "udev";
    "netplan.io";
    "netplan-generator";
    "frr";
    "frr-pythontools";
    "linux-image-.*";
    "linux-headers-.*";
    "linux-modules-.*";
    "linux-generic";
    "linux-tools-.*";
    "iproute2";
    "nftables";
    "dnsmasq";
    "openssh-server";
    "openssh-client";
};
