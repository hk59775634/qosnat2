name: release-ocserv

on:
  workflow_dispatch:
    inputs:
      upstream_version:
        description: "ocserv 官方版本（GitLab tag，如 1.4.2）"
        required: true
        default: "1.4.2"

permissions:
  contents: write

concurrency:
  group: ocserv-release
  cancel-in-progress: false

jobs:
  ocserv-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        id: ver
        run: |
          VERSION_ID="${{ github.event.inputs.upstream_version }}"
          VERSION_ID="${VERSION_ID#ocserv-}"
          VERSION_ID="${VERSION_ID#v}"
          if ! [[ "${VERSION_ID}" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?([-.+][0-9A-Za-z.-]*)?$ ]]; then
            echo "invalid ocserv version: ${VERSION_ID}" >&2
            exit 1
          fi
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
          echo "version_tag=ocserv-${VERSION_ID}" >> "$GITHUB_OUTPUT"
          echo "Using official ocserv version ${VERSION_ID}"

      - name: Install ocserv build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq \
            build-essential meson ninja-build pkg-config \
            libgnutls28-dev libev-dev libreadline-dev libseccomp-dev \
            libnl-route-3-dev libnl-genl-3-dev libtalloc-dev libhttp-parser-dev \
            libprotobuf-c-dev libpam0g-dev libradcli-dev \
            libcurl4-gnutls-dev liboath-dev libmaxminddb-dev \
            liblz4-dev libbrotli-dev libnghttp2-dev \
            autoconf automake libtool git curl

      - name: Build ocserv release tarball
        env:
          OCSERV_UPSTREAM_TAG: ${{ steps.ver.outputs.version_id }}
        run: |
          chmod +x ./scripts/build-ocserv-release.sh ./scripts/install-ocserv.sh
          sudo -E ./scripts/build-ocserv-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version_tag }}
          name: ocserv ${{ steps.ver.outputs.version_id }}
          files: dist/ocserv-linux-amd64.tar.gz
          generate_release_notes: true

      - name: Update version manifest
        run: |
          chmod +x ./scripts/release-version.sh
          ./scripts/release-version.sh ocserv bump "${{ steps.ver.outputs.version_id }}"

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(release): ocserv ${{ steps.ver.outputs.version_id }}"
          file_pattern: releases/ocserv-versions.json
          branch: main
