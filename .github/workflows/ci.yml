name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Build qosnatd
        run: go build -o /tmp/qosnatd ./cmd/qosnatd

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci and build
        working-directory: web
        run: npm ci && npm run build

  acceptance-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install runtime deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iproute2 nftables curl

      - name: Build and run qosnatd (background)
        run: |
          go build -o /tmp/qosnatd ./cmd/qosnatd
          sudo mkdir -p /var/lib/qosnat2 /etc/qosnat2
          sudo bash -c 'ADMIN_PORT=18080 STATE_FILE=/var/lib/qosnat2/state.json \
            SESSION_FILE=/var/lib/qosnat2/sessions.json \
            WEB_ROOT=$PWD/web OPENAPI_PATH=$PWD/api/openapi.yaml \
            /tmp/qosnatd' &
          sleep 2

      - name: acceptance-check (HTTP only)
        env:
          ADMIN_PORT: '18080'
        run: |
          curl -sf "http://127.0.0.1:${ADMIN_PORT}/api/v1/health" | grep -q '"ok":true' && echo OK health
          curl -sf "http://127.0.0.1:${ADMIN_PORT}/openapi.yaml" | head -1 | grep -q openapi
