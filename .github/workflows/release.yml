name: release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'releases/**'
      - 'docs/**'
      - '**/*.md'
      - 'web/**'
      - '.github/**'

permissions:
  contents: write

concurrency:
  group: qosnat2-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Allocate release version
        id: ver
        run: |
          chmod +x ./scripts/release-version.sh
          VERSION_ID="$(./scripts/release-version.sh qosnat2 next)"
          VERSION_TAG="v${VERSION_ID}"
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "Allocated ${VERSION_TAG}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev make rsync jq

      - name: Build release assets
        run: |
          chmod +x ./scripts/build-release.sh
          ./scripts/build-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version_tag }}
          name: qosnat2 ${{ steps.ver.outputs.version_id }}
          files: |
            dist/qosnatd-linux-amd64
            dist/qosnat2-linux-amd64.tar.gz
          generate_release_notes: true

      - name: Update version manifest
        run: |
          ./scripts/release-version.sh qosnat2 bump "${{ steps.ver.outputs.version_id }}"

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(release): qosnat2 ${{ steps.ver.outputs.version_id }}"
          file_pattern: releases/qosnat2-versions.json
          branch: main
