name: release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'releases/**'
      - 'docs/**'
      - '**/*.md'
      - 'web/**'
      - '.github/**'

permissions:
  contents: write

concurrency:
  group: qosnat2-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release notes
        run: |
          chmod +x ./scripts/release-notes.sh
          ./scripts/release-notes.sh validate

      - name: Allocate release version
        id: ver
        run: |
          chmod +x ./scripts/release-version.sh
          VERSION_ID="$(./scripts/release-version.sh qosnat2 next)"
          VERSION_TAG="v${VERSION_ID}"
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "Allocated ${VERSION_TAG}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev make rsync jq

      - name: Build release assets
        run: |
          chmod +x ./scripts/build-release.sh
          ./scripts/build-release.sh

      - name: Prepare release body
        id: notes
        run: |
          BODY_FILE="$(mktemp)"
          {
            echo "# qosnat2 ${{ steps.ver.outputs.version_id }}"
            echo ""
            sed '/^## 待分类/,$d' release/pending-release-notes.md \
              | sed '/^# 待发版更新说明$/d' \
              | sed '/^> /d' \
              | sed '/^$/N;/^\n$/D'
          } > "${BODY_FILE}"
          echo "body_path=${BODY_FILE}" >> "$GITHUB_OUTPUT"
          SUMMARY="$(./scripts/release-notes.sh finalize "${{ steps.ver.outputs.version_id }}")"
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version_tag }}
          name: qosnat2 ${{ steps.ver.outputs.version_id }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            dist/qosnatd-linux-amd64
            dist/qosnat2-linux-amd64.tar.gz

      - name: Update version manifest
        env:
          RELEASE_SUMMARY: ${{ steps.notes.outputs.summary }}
        run: |
          ./scripts/release-version.sh qosnat2 bump "${{ steps.ver.outputs.version_id }}"

      - name: Commit manifest and release notes
        run: |
          git add releases/qosnat2-versions.json releases/notes/ release/pending-release-notes.md
          if git diff --staged --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "chore(release): qosnat2 ${{ steps.ver.outputs.version_id }}"
          git push
