# DISABLED: github.com/hk59775634/ocserv is now the SPEC-01/DST *patch stack*,
# not an upstream ocserv mirror. A git push --mirror would wipe that repo.
#
# install-ocserv.sh fetches official source from openconnect/ocserv (GitHub/GitLab).
# Do not re-enable this workflow without changing DEST to a dedicated mirror repo.
name: mirror-ocserv

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Refuse to mirror over patch-stack repo
        run: |
          echo "::error::mirror-ocserv is disabled: hk59775634/ocserv holds the patch stack, not upstream ocserv."
          echo "Point DEST at a dedicated mirror repo before re-enabling."
          exit 1
